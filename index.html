<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      width: 80%;
      max-width: 300px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px 20px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px auto;
      padding: 20px;
      max-width: 350px;
      background: #1a1a1a;
      border-left: 4px solid #ffcc00;
      border-radius: 12px;
      text-align: left;
    }

    .timeline {
      margin-top: 10px;
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
    }

    .timeline-item {
      margin-bottom: 8px;
    }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
      transition: 0.5s;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<script>

// 🔥 MULTIPLE TRACKING DATA (NO LOCAL STORAGE ISSUE)
let shipments = {

  "BW1001": {
    status: "In Transit",
    location: "New York, USA",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: ["Shipment created - Italy", "Picked up", "In transit"]
  },

  "BW1002": {
    status: "Delivered",
    location: "London, UK",
    sender: "BlueWave",
    receiver: "Emma Brown",
    weight: "2kg",
    deliveryDate: "20 March 2026",
    history: ["Shipment created - Italy", "Delivered"]
  },

  "BW1003": {
    status: "Pending",
    location: "Paris, France",
    sender: "BlueWave",
    receiver: "Lucas Martin",
    weight: "3kg",
    deliveryDate: "30 March 2026",
    history: ["Shipment created - Italy"]
  },

  "BW1004": {
    status: "Out for Delivery",
    location: "Berlin, Germany",
    sender: "BlueWave",
    receiver: "Sophia Klein",
    weight: "4kg",
    deliveryDate: "28 March 2026",
    history: ["Shipment created - Italy", "In transit", "Out for delivery"]
  },

  "BW1005": {
    status: "In Transit",
    location: "Madrid, Spain",
    sender: "BlueWave",
    receiver: "Carlos Diaz",
    weight: "6kg",
    deliveryDate: "27 March 2026",
    history: ["Shipment created - Italy", "In transit"]
  },

  "BW1006": {
    status: "Out for Delivery",
    location: "Amsterdam, Netherlands",
    sender: "BlueWave",
    receiver: "Anna de Vries",
    weight: "1.5kg",
    deliveryDate: "26 March 2026",
    history: ["Shipment created - Italy", "In transit", "Out for delivery"]
  }

};

// 🚀 TRACK FUNCTION
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Tracking code not found</p>";

    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("progressText").innerText = "";
    return;
  }

  // STATUS COLOR
  let color =
    data.status === "Delivered" ? "green" :
    data.status === "In Transit" ? "orange" :
    data.status === "Out for Delivery" ? "gold" : "gray";

  let statusHTML = `
    <div style="
      background:${color};
      padding:8px 16px;
      border-radius:20px;
      display:inline-block;
      font-weight:bold;
      margin-bottom:10px;
      color:${color === 'gold' ? 'black' : 'white'};
    ">
      ${data.status}
    </div>
  `;

  // TIMELINE
  let historyHTML = "";
  data.history.forEach(item => {
    historyHTML += `<div class="timeline-item">${item}</div>`;
  });

  historyHTML = `<div class="timeline">${historyHTML}</div>`;

  // PROGRESS
  let progress = 0;
  if (data.status === "Pending") progress = 25;
  else if (data.status === "In Transit") progress = 50;
  else if (data.status === "Out for Delivery") progress = 75;
  else if (data.status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";
  document.getElementById("progressText").innerText =
    "Progress: " + progress + "%";

  // RESULT
  document.getElementById("result").innerHTML =
    statusHTML + `
    <br>
    <b>📦 Tracking ID:</b> ${code}<br><br>
    📍 ${data.location}<br>
    📦 ${data.sender}<br>
    👤 ${data.receiver}<br>
    ⚖️ ${data.weight}<br>
    📅 ${data.deliveryDate}<br>
    ` + historyHTML;
}

</script>

</body>
</html>

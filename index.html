<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueWave Logistics</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:white;
  text-align:center;
}

header {
  background:#ffcc00;
  color:black;
  padding:15px;
  font-weight:bold;
}

input {
  padding:12px;
  margin:10px;
  width:85%;
  max-width:320px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button {
  padding:12px;
  background:#ffcc00;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.hidden { display:none; }

.card {
  margin:15px auto;
  padding:15px;
  max-width:350px;
  background:#1a1a1a;
  border-left:5px solid #ffcc00;
  border-radius:12px;
  text-align:left;
}

.logout {
  background:red;
  color:white;
}
</style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button><br>
  <button onclick="showSignup()">Create Account</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="hidden">
  <h2>Sign Up</h2>
  <input id="signupEmail" placeholder="Email"><br>
  <input id="signupPass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Create</button><br>
  <button onclick="showLogin()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h2>Track Shipment</h2>
<input id="codeInput" placeholder="Tracking code"><br>
<button onclick="track()">Track</button>

<div id="result"></div>

<h3>My Shipments</h3>
<div id="myShipments"></div>

<h3>Add Shipment (Admin)</h3>

<input id="newLocation" placeholder="Location"><br>
<input id="newSender" placeholder="Sender"><br>
<input id="newReceiver" placeholder="Receiver Email"><br>
<input id="newWeight" placeholder="Weight"><br>
<input id="newDate" placeholder="Delivery Date"><br>
<input id="newStatus" placeholder="Status"><br>

<button onclick="addShipment()">Add Shipment</button>

<br><br>
<button onclick="logout()" class="logout">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// UI SWITCH
window.showSignup = () => {
  loginBox.classList.add("hidden");
  signupBox.classList.remove("hidden");
};

window.showLogin = () => {
  signupBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
};

window.showDashboard = () => {
  loginBox.classList.add("hidden");
  signupBox.classList.add("hidden");
  dashboard.classList.remove("hidden");
};

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    showDashboard();
    loadMyShipments(user.email);
  }
});

// SIGNUP
window.signup = async () => {
  try{
    await createUserWithEmailAndPassword(auth, signupEmail.value, signupPass.value);
    alert("Account created");
    showDashboard();
  }catch(e){
    alert(e.message);
  }
};

// LOGIN
window.login = async () => {
  try{
    await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
  }catch(e){
    alert(e.message);
  }
};

// LOGOUT
window.logout = () => {
  signOut(auth);
  location.reload();
};

// ADD SHIPMENT
window.addShipment = async () => {

  if (!newLocation.value || !newReceiver.value) {
    alert("Fill all fields");
    return;
  }

  const code = "BW" + Date.now().toString().slice(-6);

  await setDoc(doc(db, "shipments", code), {
    owner: newReceiver.value.toLowerCase(),
    location: newLocation.value,
    sender: newSender.value,
    receiver: newReceiver.value,
    weight: newWeight.value,
    deliveryDate: newDate.value,
    status: newStatus.value,
    history: [
      "Shipment created",
      "Processing",
      "In transit"
    ]
  });

  result.innerHTML = `
    <div class="card">
      ✅ Shipment created<br>
      <b>${code}</b>
    </div>
  `;
};

// TRACK
window.track = async () => {

  const code = codeInput.value;
  const docSnap = await getDoc(doc(db,"shipments",code));

  if(!docSnap.exists()){
    result.innerHTML = `<div class="card" style="color:red;">❌ Not found</div>`;
    return;
  }

  const data = docSnap.data();

  let historyHTML = "";
  data.history.forEach(item=>{
    historyHTML += `<div>• ${item}</div>`;
  });

  result.innerHTML = `
    <div class="card">
      <b>${code}</b><br><br>

      📍 ${data.location}<br>
      👤 ${data.receiver}<br>
      📦 ${data.weight}<br>
      📅 ${data.deliveryDate}<br>
      🚚 ${data.status}<br><br>

      <b>Timeline:</b><br>
      ${historyHTML}
    </div>
  `;
};

// LOAD USER SHIPMENTS
async function loadMyShipments(email){

  const q = query(collection(db,"shipments"), where("owner","==",email.toLowerCase()));
  const querySnapshot = await getDocs(q);

  let html = "";

  querySnapshot.forEach(doc=>{
    const data = doc.data();

    html += `
      <div class="card">
        <b>${doc.id}</b><br>
        ${data.status}<br>
        ${data.location}
      </div>
    `;
  });

  myShipments.innerHTML = html || "No shipments yet";
}

</script>

</body>
</html>

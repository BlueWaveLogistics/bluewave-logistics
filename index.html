<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    header {
      background:#ffcc00;
      color:black;
      padding:15px;
      font-weight:bold;
      font-size:20px;
    }

    input {
      padding:12px;
      margin:10px;
      width:80%;
      max-width:300px;
      border:none;
      border-radius:8px;
    }

    button {
      padding:12px 20px;
      background:#ffcc00;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    #dashboard { display:none; }
    #adminPanel { display:none; }

    #result {
      margin:20px auto;
      padding:20px;
      max-width:350px;
      background:#1a1a1a;
      border-left:5px solid #ffcc00;
      border-radius:12px;
      text-align:left;
    }

    .timeline {
      border-left:2px solid #ffcc00;
      padding-left:10px;
      margin-top:10px;
    }

    #progressContainer {
      width:80%;
      max-width:350px;
      margin:20px auto;
      background:#333;
      border-radius:20px;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#ffcc00;
      border-radius:20px;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
  <button onclick="unlockAdmin()">Admin</button>
</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Customer Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Track Shipment</h2>

  <input id="code" placeholder="Tracking code"><br>
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <p id="progressText"></p>

  <button onclick="logout()" style="background:red;color:white;">Logout</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>

  <input id="newStatus" placeholder="Status">

  <div>
    <button onclick="setStatus('Pending')">Pending</button>
    <button onclick="setStatus('In Transit')">Transit</button>
    <button onclick="setStatus('Out for Delivery')">Out</button>
    <button onclick="setStatus('Delivered')">Delivered</button>
  </div>

  <button onclick="addShipment()">Add Shipment</button>
</div>

<script>

// LOAD DATA
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status:"In Transit",
    location:"New York",
    sender:"BlueWave",
    receiver:"John",
    weight:"5kg",
    deliveryDate:"25 March",
    history:["Created - Italy","Transit"]
  }
};

let counter = Object.keys(shipments).length + 1000;

// SAVE
function saveData(){
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// LOGIN
function login(){
  if(email.value && password.value){
    localStorage.setItem("user", email.value);
    showDashboard();
  }
}

// SHOW DASHBOARD
function showDashboard(){
  loginBox.style.display="none";
  dashboard.style.display="block";
}

// AUTO LOGIN
if(localStorage.getItem("user")) showDashboard();

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

// ADMIN UNLOCK
function unlockAdmin(){
  const pass = prompt("Admin password");
  if(pass==="admin123"){
    adminPanel.style.display="block";
  } else alert("Wrong password");
}

// STATUS BUTTON
function setStatus(s){
  newStatus.value = s;
}

// ADD SHIPMENT
function addShipment(){
  counter++;
  const code="BW"+counter;

  const status=newStatus.value;
  const location=newLocation.value;

  let history=[status+" - "+location];

  shipments[code]={
    status,
    location,
    sender:newSender.value,
    receiver:newReceiver.value,
    weight:newWeight.value,
    deliveryDate:newDate.value,
    history
  };

  saveData();
  alert("Shipment created: "+code);
}

// TRACK
function track(){
  const code=document.getElementById("code").value;
  const data=shipments[code];

  if(!data){
    result.innerHTML="❌ Not found";
    return;
  }

  let color=
    data.status==="Delivered"?"green":
    data.status==="In Transit"?"orange":
    data.status==="Out for Delivery"?"gold":"gray";

  let statusHTML=`<div style="background:${color};padding:6px 12px;border-radius:20px;">${data.status}</div>`;

  let historyHTML="";
  data.history.forEach(i=>{
    historyHTML+=`<div>${i}</div>`;
  });

  historyHTML=`<div class="timeline">${historyHTML}</div>`;

  let progress=0;
  if(data.status==="Pending")progress=25;
  else if(data.status==="In Transit")progress=50;
  else if(data.status==="Out for Delivery")progress=75;
  else if(data.status==="Delivered")progress=100;

  progressBar.style.width=progress+"%";
  progressText.innerText="Progress: "+progress+"%";

  result.innerHTML=
    statusHTML+
    `<br><b>${code}</b><br>
    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.weight}<br><br>`+
    historyHTML;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    input {
      padding: 12px;
      width: 80%;
      max-width: 300px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px 18px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    #result {
      margin: 20px auto;
      padding: 20px;
      max-width: 350px;
      background: #141414;
      border-left: 5px solid #ffcc00;
      border-radius: 12px;
      text-align: left;
    }

    .status {
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 10px;
    }

    .pending { background: gray; }
    .transit { background: orange; }
    .out { background: gold; color: black; }
    .delivered { background: green; }

    .timeline {
      margin-top: 10px;
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
    }

    .timeline-item {
      margin-bottom: 8px;
    }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: linear-gradient(90deg, #ffcc00, orange);
      border-radius: 20px;
      transition: 0.5s;
    }

    #adminPanel {
      display: none;
      margin: 20px;
      padding: 15px;
      background: #141414;
      border-radius: 12px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin: 10px;
      box-shadow: 0 0 10px rgba(255,204,0,0.2);
    }
  </style>
</head>

<body>

<header>
  <div>BlueWave Logistics 🚚</div>
  <button onclick="unlockAdmin()">Admin</button>
</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h3>Dashboard</h3>

  <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
    <div class="card">
      <h4>Total</h4>
      <p id="totalCount">0</p>
    </div>

    <div class="card">
      <h4>In Transit</h4>
      <p id="transitCount">0</p>
    </div>

    <div class="card">
      <h4>Delivered</h4>
      <p id="deliveredCount">0</p>
    </div>
  </div>

  <input id="searchBox" placeholder="Search tracking ID..." oninput="searchShipment()">

  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>
  <input id="newStatus" placeholder="Status"><br>

  <button onclick="setStatus('Pending')">Pending</button>
  <button onclick="setStatus('In Transit')">Transit</button>
  <button onclick="setStatus('Out for Delivery')">Out</button>
  <button onclick="setStatus('Delivered')">Delivered</button>

  <br>
  <button onclick="addShipment()">Add Shipment</button>

  <h3>All Shipments</h3>
  <div id="shipmentList"></div>

</div>

<script>

let shipments = {
  "BW1001": {status:"In Transit",location:"New York, USA",sender:"BlueWave",receiver:"John Doe",weight:"5kg",deliveryDate:"25 March 2026",history:["Shipment created - Italy","Picked up","In transit"]},
  "BW1002": {status:"Delivered",location:"London, UK",sender:"BlueWave",receiver:"Emma Brown",weight:"2kg",deliveryDate:"20 March 2026",history:["Shipment created - Italy","Delivered"]},
  "BW1003": {status:"Pending",location:"Paris, France",sender:"BlueWave",receiver:"Lucas Martin",weight:"3kg",deliveryDate:"30 March 2026",history:["Shipment created - Italy"]},
  "BW1004": {status:"Out for Delivery",location:"Berlin, Germany",sender:"BlueWave",receiver:"Sophia Klein",weight:"4kg",deliveryDate:"28 March 2026",history:["Shipment created - Italy","In transit","Out for delivery"]},
  "BW1005": {status:"In Transit",location:"Madrid, Spain",sender:"BlueWave",receiver:"Carlos Diaz",weight:"6kg",deliveryDate:"27 March 2026",history:["Shipment created - Italy","In transit"]},
  "BW1006": {status:"Out for Delivery",location:"Amsterdam, Netherlands",sender:"BlueWave",receiver:"Anna de Vries",weight:"1.5kg",deliveryDate:"26 March 2026",history:["Shipment created - Italy","In transit","Out for delivery"]}
};

function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    document.getElementById("result").innerHTML = "<p style='color:red;'>Tracking code not found</p>";
    return;
  }

  let statusClass = "";
  if (data.status === "Pending") statusClass = "pending";
  else if (data.status === "In Transit") statusClass = "transit";
  else if (data.status === "Out for Delivery") statusClass = "out";
  else if (data.status === "Delivered") statusClass = "delivered";

  let historyHTML = "";
  data.history.forEach(item => {
    historyHTML += `<div class="timeline-item">${item}</div>`;
  });

  let progress = 25;
  if (data.status === "In Transit") progress = 50;
  if (data.status === "Out for Delivery") progress = 75;
  if (data.status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";
  document.getElementById("progressText").innerText = "Progress: " + progress + "%";

  document.getElementById("result").innerHTML =
    `<div class="status ${statusClass}">${data.status}</div>
    <br>
    <b>📦 Tracking ID:</b> ${code}<br><br>
    📍 ${data.location}<br>
    📦 ${data.sender}<br>
    👤 ${data.receiver}<br>
    ⚖️ ${data.weight}<br>
    📅 ${data.deliveryDate}<br>
    <div class="timeline">${historyHTML}</div>`;
}

function unlockAdmin() {
  if (prompt("Password") === "admin123") {
    document.getElementById("adminPanel").style.display = "block";
    loadShipments();
  }
}

function addShipment() {
  const code = "BW" + Math.floor(Math.random() * 9000 + 1000);

  shipments[code] = {
    status: document.getElementById("newStatus").value,
    location: document.getElementById("newLocation").value,
    sender: document.getElementById("newSender").value,
    receiver: document.getElementById("newReceiver").value,
    weight: document.getElementById("newWeight").value,
    deliveryDate: document.getElementById("newDate").value,
    history: ["Shipment created - Italy"]
  };

  alert("Created: " + code);
  loadShipments();
}

function loadShipments() {
  let list = "";

  for (let code in shipments) {
    let s = shipments[code];

    list += `
      <div class="card">
        <b>${code}</b><br>
        ${s.status} - ${s.location}<br>
        <button onclick="quickTrack('${code}')">Track</button>
      </div>
    `;
  }

  document.getElementById("shipmentList").innerHTML = list;
  updateDashboard();
}

function quickTrack(code) {
  document.getElementById("code").value = code;
  track();
}

function updateDashboard() {
  let total = 0, transit = 0, delivered = 0;

  for (let code in shipments) {
    total++;
    if (shipments[code].status === "In Transit") transit++;
    if (shipments[code].status === "Delivered") delivered++;
  }

  document.getElementById("totalCount").innerText = total;
  document.getElementById("transitCount").innerText = transit;
  document.getElementById("deliveredCount").innerText = delivered;
}

function searchShipment() {
  const search = document.getElementById("searchBox").value.toLowerCase();
  let list = "";

  for (let code in shipments) {
    if (code.toLowerCase().includes(search)) {
      let s = shipments[code];

      list += `
        <div class="card">
          <b>${code}</b><br>
          ${s.status} - ${s.location}<br>
          <button onclick="quickTrack('${code}')">Track</button>
        </div>
      `;
    }
  }

  document.getElementById("shipmentList").innerHTML = list;
}

</script>

</body>
</html>

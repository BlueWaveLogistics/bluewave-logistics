<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #111;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .timeline {
      margin-top: 15px;
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
    }

    .timeline-item {
      margin-bottom: 8px;
    }

    #progressContainer {
      margin-top: 15px;
      background: #333;
      border-radius: 10px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 10px;
      transition: 0.5s;
    }

  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<div class="container">

  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <div id="result" class="card"></div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <p id="progressText"></p>

  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location">
  <input id="newStatus" placeholder="Status">

  <button onclick="setStatus('Pending')">Pending</button>
  <button onclick="setStatus('In Transit')">Transit</button>
  <button onclick="setStatus('Out for Delivery')">Out</button>
  <button onclick="setStatus('Delivered')">Delivered</button>

  <button onclick="addShipment()">Add Shipment</button>

</div>

</div>

<script>

// 💾 STORAGE
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status: "In Transit",
    location: "New York",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: [
      "Shipment created - Italy",
      "In transit"
    ]
  }
};

let counter = Object.keys(shipments).length + 1000;

function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// 🚀 TRACK (AUTO SYSTEM)
function track() {
  const code = document.getElementById("code").value.trim().toUpperCase();

  let data = shipments[code];

  // AUTO GENERATE
  if (!data) {

    const locations = ["New York", "London", "Berlin", "Paris", "Madrid", "Rome", "Dubai"];
    const names = ["John Doe", "Maria Lopez", "James Smith", "Ali Khan", "Sophia Klein"];

    const randomLocation = locations[Math.floor(Math.random() * locations.length)];
    const randomName = names[Math.floor(Math.random() * names.length)];

    const statuses = ["Pending", "In Transit", "Out for Delivery", "Delivered"];
    const status = statuses[Math.floor(Math.random() * statuses.length)];

    let history = [];

    if (status === "Pending") history = ["Shipment created - Italy"];
    if (status === "In Transit") history = ["Shipment created - Italy", "In transit"];
    if (status === "Out for Delivery") history = ["Shipment created - Italy", "Out for delivery"];
    if (status === "Delivered") history = ["Shipment created - Italy", "Delivered"];

    data = {
      status,
      location: randomLocation,
      sender: "BlueWave",
      receiver: randomName,
      weight: Math.floor(Math.random() * 10 + 1) + "kg",
      deliveryDate: "Arriving soon",
      history
    };
  }

  // STATUS STYLE
  let color =
    data.status === "Delivered" ? "green" :
    data.status === "In Transit" ? "orange" :
    data.status === "Out for Delivery" ? "gold" : "gray";

  let statusHTML = `
    <div style="
      background:${color};
      padding:8px 16px;
      border-radius:20px;
      display:inline-block;
      font-weight:bold;
      margin-bottom:10px;
      color:${color === 'gold' ? 'black' : 'white'};
    ">
      ${data.status}
    </div>
  `;

  // TIMELINE
  let historyHTML = "";
  data.history.forEach(item => {
    historyHTML += `<div class="timeline-item">${item}</div>`;
  });

  historyHTML = `<div class="timeline">${historyHTML}</div>`;

  // PROGRESS
  let progress = 25;
  if (data.status === "In Transit") progress = 50;
  if (data.status === "Out for Delivery") progress = 75;
  if (data.status === "Delivered") progress = 100;

  const bar = document.getElementById("progressBar");
  bar.style.width = "0%";

  setTimeout(() => {
    bar.style.width = progress + "%";
  }, 200);

  document.getElementById("progressText").innerText =
    "Progress: " + progress + "%";

  // RESULT
  document.getElementById("result").innerHTML =
    statusHTML + `
    <br>
    <b>📦 Tracking ID:</b> ${code}<br><br>
    📍 ${data.location}<br>
    📦 ${data.sender}<br>
    👤 ${data.receiver}<br>
    ⚖️ ${data.weight}<br>
    📅 ${data.deliveryDate}<br>
    ` + historyHTML;
}

// ➕ ADD SHIPMENT
function addShipment() {
  counter++;
  const code = "BW" + counter;

  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  shipments[code] = {
    status,
    location,
    sender: "BlueWave",
    receiver: "New Customer",
    weight: "2kg",
    deliveryDate: "Processing",
    history: [status + " - " + location]
  };

  saveData();

  alert("✅ Created: " + code);
}

// STATUS BUTTON
function setStatus(status) {
  document.getElementById("newStatus").value = status;
}

</script>

</body>
</html>

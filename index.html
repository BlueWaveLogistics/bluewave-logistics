<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#ffcc00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  color:black;
  font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.hero{
  background:url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  background-size:cover;
  padding:120px 20px;
  text-align:center;
}

.track-box{
  display:flex;
  max-width:400px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

.track-box input{
  flex:1;
  padding:15px;
  border:none;
}

.track-box button{
  background:#ffcc00;
  border:none;
  padding:15px;
  font-weight:bold;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
}

input, select{
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<button onclick="show('login')">Login</button>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Live Shipment Tracking</h1>

<div class="track-box">
<input id="code" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
</div>
</div>

<div class="features">
<div class="card">🚚 Fast Delivery</div>
<div class="card">✈️ International Shipping</div>
<div class="card">📦 Secure Packaging</div>
<div class="card">📍 Real-Time Tracking</div>
</div>

<div id="result"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2 style="padding:20px;">Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 style="padding:20px;">Admin Dashboard 🔐</h2>
<button onclick="show('admin')">Add Shipment</button>
<button onclick="logout()">Logout</button>
<div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="padding:20px;">Add Shipment</h2>

<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">

<input id="date" type="date" readonly>

<select id="status" onchange="autoDate()">
<option value="">Select Status</option>
<option>Order Received</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Arrived at Facility</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="addShipment()">Add Shipment</button>
<button onclick="show('dashboard')">Back</button>
</div>

  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",

const app = initializeApp(firebaseConfig);

window.show = (id)=>{
  if((id==="dashboard" || id==="admin") && !isAdmin){
    alert("Admin only 🔐");
    return;
  }

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    h2 {
      margin-top: 30px;
    }

    input {
      padding: 14px;
      width: 80%;
      max-width: 320px;
      border-radius: 8px;
      border: none;
      margin: 10px;
      background: #222;
      color: white;
    }

    button {
      padding: 14px 25px;
      border-radius: 8px;
      background: #ffcc00;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px auto;
      padding: 20px;
      max-width: 350px;
      background: #1a1a1a;
      border-radius: 10px;
      text-align: left;
      border-left: 6px solid #ffcc00;
    }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 12px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
    }

    #progressText {
      margin-top: 10px;
      color: #aaa;
    }

    .timeline {
      margin-top: 15px;
      border-left: 2px solid #ffcc00;
      padding-left: 15px;
    }

    .timeline-item {
      margin-bottom: 10px;
    }

    #map {
      width: 90%;
      height: 320px;
      margin: 20px auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<h2>Live Shipment Tracking</h2>

<input id="code" placeholder="Enter tracking code">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<div id="map"></div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// GLOBAL VARIABLES
let map, marker, routeLine, interval;

// INIT MAP
function initMap() {
  map = L.map('map').setView([41.9028, 12.4964], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

// DRAW ROUTE
function drawRoute(route) {
  if (routeLine) map.removeLayer(routeLine);
  routeLine = L.polyline(route, { color: 'orange', weight: 4 }).addTo(map);
}

// REAL-TIME TRUCK
function moveTruckLive(route) {
  if (interval) clearInterval(interval);

  let i = 0;
  let progressStep = 0;
  let speed = 0.01;

  if (marker) map.removeLayer(marker);

  marker = L.marker(route[0]).addTo(map);

  interval = setInterval(() => {

    if (i >= route.length - 1) {
      clearInterval(interval);
      document.getElementById("progressText").innerText = "Delivered ✅";
      document.getElementById("progressBar").style.width = "100%";
      return;
    }

    let start = route[i];
    let end = route[i + 1];

    let lat = start[0] + (end[0] - start[0]) * progressStep;
    let lng = start[1] + (end[1] - start[1]) * progressStep;

    marker.setLatLng([lat, lng]);

    document.getElementById("progressText").innerText =
      `📍 Live: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

    progressStep += speed;

    if (progressStep >= 1) {
      progressStep = 0;
      i++;
      updateProgress(i, route.length);
    }

  }, 100);
}

// PROGRESS
function updateProgress(step, total) {
  let progress = (step / (total - 1)) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

// 🚨 IMPORTANT: GLOBAL FUNCTION (FIXED)
window.track = function () {

  const code = document.getElementById("code").value;

  if (!code) {
    alert("Enter tracking code");
    return;
  }

  const route = [
    [41.9028, 12.4964],
    [52.52, 13.405],
    [51.5074, -0.1278],
    [40.7128, -74.0060]
  ];

  initMap();
  drawRoute(route);
  moveTruckLive(route);

  let historyHTML = `
  <div class="timeline">
    <div class="timeline-item">📦 Shipment created - Italy</div>
    <div class="timeline-item">🚚 In transit - Berlin</div>
    <div class="timeline-item">✈️ Arrived - London</div>
    <div class="timeline-item">🏠 Out for delivery - New York</div>
  </div>`;

  document.getElementById("result").innerHTML = `
    <b>📦 Tracking ID:</b> ${code}<br><br>
    🚚 Live tracking started...
    ${historyHTML}
  `;
};

// LOAD MAP
initMap();

</script>

</body>
</html>

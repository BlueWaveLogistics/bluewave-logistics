<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

header{
  background:#ffcc00;
  color:black;
  padding:15px;
  font-weight:bold;
}

input{
  padding:14px;
  width:80%;
  max-width:300px;
  border-radius:8px;
  border:none;
  margin:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.card{
  margin:20px auto;
  padding:20px;
  max-width:350px;
  background:#1a1a1a;
  border-radius:12px;
  text-align:left;
}

.timeline{
  margin-top:10px;
  border-left:2px solid #ffcc00;
  padding-left:10px;
}

.timeline-item{
  margin-bottom:8px;
}
</style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<br>

<button onclick="track()">Track</button>

<div id="result"></div>

<script>

// DATABASE (AUTO SAVE)
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001":{
    status:"In Transit",
    location:"New York, USA",
    receiver:"John Doe",
    weight:"5kg",
    deliveryDate:"25 March 2026",
    paid:false,
    history:[
      "Shipment created - Italy",
      "Picked up",
      "In transit"
    ]
  }
};

// SAVE
function saveData(){
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// TRACK
function track(){

  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if(!data){
    result.innerHTML = "<p style='color:red'>Tracking code not found</p>";
    return;
  }

  let color =
    data.status==="Delivered"?"green":
    data.status==="In Transit"?"orange":
    data.status==="Out for Delivery"?"gold":"gray";

  let paymentStatus = data.paid
    ? "<span style='color:lightgreen'>✅ Paid</span>"
    : "<span style='color:red'>❌ Not Paid</span>";

  let historyHTML="";
  data.history.forEach(item=>{
    historyHTML += `<div class="timeline-item">${item}</div>`;
  });

  historyHTML = `<div class="timeline">${historyHTML}</div>`;

  result.innerHTML = `
  <div class="card">

    <h3>${code}</h3>

    <div style="
      background:${color};
      padding:6px 12px;
      border-radius:20px;
      display:inline-block;
      margin-bottom:10px;
      color:${color==="gold"?"black":"white"};
    ">
      ${data.status}
    </div>

    <br>

    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.weight}<br>
    📅 ${data.deliveryDate}<br><br>

    💳 Payment: ${paymentStatus}<br><br>

    ${!data.paid ? `
      <button onclick="payEmail('${code}')">📧 Pay via Email</button>

      <a href="https://www.paypal.me/shippingcompany015/50" target="_blank">
        <button>💳 Pay with PayPal</button>
      </a>

      <button onclick="markPaid('${code}')">✔ I Paid</button>
    ` : ""}

    ${historyHTML}

  </div>
  `;
}

// EMAIL PAYMENT
function payEmail(code){

  const subject = encodeURIComponent("Payment for Shipment " + code);

  const body = encodeURIComponent(
    "Hello BlueWave Logistics,%0D%0A%0D%0A" +
    "I want to pay for shipment: " + code + "%0D%0A%0D%0A" +
    "Please confirm my payment.%0D%0A%0D%0AThank you."
  );

  window.location.href =
    "mailto:shippingcompanyservice015@gmail.com?subject=" + subject + "&body=" + body;
}

// MARK PAID
function markPaid(code){
  shipments[code].paid = true;
  saveData();
  track();
  alert("Payment confirmed ✅");
}

</script>

</body>
</html>

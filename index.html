<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#ffcc00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:black;
  font-weight:bold;
}

header div button{
  margin-left:10px;
}

.page{display:none;}
.active{display:block;}

.hero{
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  background-size:cover;
  padding:120px 20px;
  text-align:center;
}

.track-box{
  display:flex;
  max-width:400px;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.track-box input{
  flex:1;
  padding:15px;
  border:none;
}

.track-box button{
  background:#ffcc00;
  border:none;
  padding:15px;
  font-weight:bold;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.timeline{
  border-left:3px solid #444;
  margin-left:10px;
  padding-left:20px;
}

.step{
  margin:15px 0;
  position:relative;
  color:#777;
}

.step::before{
  content:"";
  position:absolute;
  left:-27px;
  top:5px;
  width:15px;
  height:15px;
  border-radius:50%;
  background:#555;
}

.step.active{
  color:#00ff88;
  font-weight:bold;
}

.step.active::before{
  background:#00ff88;
}

input, select{
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<div>
<button onclick="show('home')">Home</button>
<button onclick="show('login')">Login</button>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Live Shipment Tracking</h1>

<div class="track-box">
<input id="code" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
</div>
</div>

<div id="result"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2 style="padding:20px;">Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 style="padding:20px;">Admin Dashboard 🔐</h2>
<button onclick="show('admin')">Add Shipment</button>
<button onclick="logout()">Logout</button>
<div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="padding:20px;">Add Shipment</h2>

<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">

<select id="status">
<option>Order Received</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Arrived at Facility</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="addShipment()">Add Shipment</button>
<button onclick="show('dashboard')">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isAdmin = false;

// NAVIGATION
window.show = (id)=>{
  if((id==="dashboard" || id==="admin") && !isAdmin){
    alert("Admin only 🔐");
    return;
  }
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// AUTH
window.signup = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("Account created");
};

window.login = async ()=>{
  const user = await signInWithEmailAndPassword(auth,email.value,password.value);
  isAdmin = (user.user.email === "shippingcompanyservice015@gmail.com");

  if(isAdmin){
    show("dashboard");
    loadShipments();
  } else {
    show("home");
  }
};

window.logout = ()=>{
  isAdmin = false;
  signOut(auth);
  show("home");
};

// ADD SHIPMENT
window.addShipment = async ()=>{
  const locationVal = document.getElementById("location").value;
  const receiverVal = document.getElementById("receiver").value;
  const weightVal = document.getElementById("weight").value;
  const statusVal = document.getElementById("status").value;

  const code = "BW"+Math.floor(1000+Math.random()*9000);

  await setDoc(doc(db,"shipments",code),{
    location:locationVal,
    receiver:receiverVal,
    weight:weightVal,
    status:statusVal,
    paid:false
  });

  alert("Created: "+code);
  loadShipments();
};

// LOAD DASHBOARD
async function loadShipments(){
  shipments.innerHTML="";
  const snap = await getDocs(collection(db,"shipments"));

  snap.forEach(docu=>{
    const d = docu.data();
    shipments.innerHTML += `
    <div class="card">
    <b>${docu.id}</b><br>
    ${d.location}<br>
    ${d.status}<br>
    ${d.paid ? "✅ Paid" : "❌ Not Paid"}
    </div>`;
  });
}

// TRACK
window.track = async ()=>{
  const codeVal = document.getElementById("code").value.trim();
  const snap = await getDoc(doc(db,"shipments",codeVal));

  if(!snap.exists()){
    document.getElementById("result").innerHTML="Not found";
    return;
  }

  const d = snap.data();

  document.getElementById("result").innerHTML = `
<div class="card">

<h2>📦 ${codeVal}</h2>

<p><b>📍 ${d.location}</b></p>
<p>👤 ${d.receiver}</p>
<p>📦 ${d.weight}</p>

<hr>

<h3>🚚 Shipment Progress</h3>

<div class="timeline">

<div class="step ${d.status==="Order Received"?"active":""}">
<span>Order Received</span>
</div>

<div class="step ${["Picked Up","In Transit","Arrived at Facility","Out for Delivery","Delivered"].includes(d.status)?"active":""}">
<span>Picked Up</span>
</div>

<div class="step ${["In Transit","Arrived at Facility","Out for Delivery","Delivered"].includes(d.status)?"active":""}">
<span>In Transit</span>
</div>

<div class="step ${["Arrived at Facility","Out for Delivery","Delivered"].includes(d.status)?"active":""}">
<span>Arrived at Facility</span>
</div>

<div class="step ${["Out for Delivery","Delivered"].includes(d.status)?"active":""}">
<span>Out for Delivery</span>
</div>

<div class="step ${d.status==="Delivered"?"active":""}">
<span>Delivered</span>
</div>

</div>

<hr>

<p><b>💳 Payment:</b></p>

${d.paid ? "✅ Paid" : `
❌ Not Paid
<br><br>
<a href="https://www.paypal.me/shippingcompany015" target="_blank">
<button>Pay with PayPal</button>
</a>
<br><br>
<button onclick="markPaid('${codeVal}')">I Have Paid</button>
`}

</div>
`;
};

// MARK PAID
window.markPaid = async (code)=>{
  await updateDoc(doc(db,"shipments",code),{
    paid:true
  });

  alert("Payment confirmed");
  track();
};

</script>

</body>
</html>

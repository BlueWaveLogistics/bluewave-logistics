<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#000; color:white; }

header {
  background:#ffcc00;
  padding:15px;
  text-align:center;
  font-weight:bold;
  color:black;
}

.page { display:none; padding:20px; }
.active { display:block; }

input, button {
  padding:12px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button { background:#ffcc00; font-weight:bold; }

.card {
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- HOME -->
<div id="home" class="page active">
  <h2>Track Shipment</h2>
  <input id="trackCode" placeholder="Tracking code">
  <button onclick="track()">Track</button>

  <br><br>
  <button onclick="show('login')">Login</button>

  <div id="trackResult"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <br>
  <button onclick="login()">Login</button>
  <button onclick="signup()">Create Account</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2>Dashboard</h2>
  <button onclick="show('admin')">Admin Panel</button>
  <button onclick="logout()">Logout</button>

  <div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Add Shipment</h2>

  <input id="location" placeholder="Location">
  <input id="receiver" placeholder="Receiver">
  <input id="weight" placeholder="Weight">
  <input id="date" placeholder="Date">
  <input id="status" placeholder="Status">

  <br>
  <button onclick="addShipment()">Add Shipment</button>
  <button onclick="show('dashboard')">Back</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// PAGE SWITCH
window.show = (id) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// LOGIN
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
  show("dashboard");
  loadShipments();
};

// SIGNUP
window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
  alert("Account created");
};

// LOGOUT
window.logout = () => {
  signOut(auth);
  show("home");
};

// ADD SHIPMENT
window.addShipment = async () => {
  const code = "BW" + Math.floor(Math.random()*10000);

  await setDoc(doc(db, "shipments", code), {
    location: location.value,
    receiver: receiver.value,
    weight: weight.value,
    deliveryDate: date.value,
    status: status.value
  });

  alert("Created: " + code);
};

// TRACK
window.track = async () => {
  const code = trackCode.value;

  const snap = await getDoc(doc(db,"shipments",code));

  if(snap.exists()){
    const d = snap.data();
    trackResult.innerHTML = `
      <div class="card">
      ${code}<br>
      ${d.location}<br>
      ${d.receiver}<br>
      ${d.status}
      </div>
    `;
  } else {
    trackResult.innerHTML = "Not found";
  }
};

// LOAD SHIPMENTS
async function loadShipments(){
  shipments.innerHTML = "";

  const snap = await getDocs(collection(db,"shipments"));

  snap.forEach(doc => {
    const d = doc.data();
    shipments.innerHTML += `
      <div class="card">
      ${doc.id}<br>
      ${d.location}<br>
      ${d.status}
      </div>
    `;
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#ffcc00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  color:black;
  font-weight:bold;
}

.page{display:none;}
.active{display:block;}

.hero{
  background:url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  background-size:cover;
  padding:120px 20px;
  text-align:center;
}

.track-box{
  display:flex;
  max-width:400px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

.track-box input{
  flex:1;
  padding:15px;
  border:none;
}

.track-box button{
  background:#ffcc00;
  border:none;
  padding:15px;
  font-weight:bold;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
}

input, select{
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<button onclick="show('login')">Login</button>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Live Shipment Tracking</h1>

<div class="track-box">
<input id="code" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
</div>
</div>

<div class="features">
<div class="card">🚚 Fast Delivery</div>
<div class="card">✈️ International Shipping</div>
<div class="card">📦 Secure Packaging</div>
<div class="card">📍 Real-Time Tracking</div>
</div>

<div id="result"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2 style="padding:20px;">Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 style="padding:20px;">Admin Dashboard 🔐</h2>
<button onclick="show('admin')">Add Shipment</button>
<button onclick="logout()">Logout</button>
<div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="padding:20px;">Add Shipment</h2>

<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">
<input id="date" type="date" readonly>

<select id="status" onchange="autoDate()">
<option value="">Select Status</option>
<option>Order Received</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Arrived at Facility</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="addShipment()">Add Shipment</button>
<button onclick="show('dashboard')">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const ADMIN_EMAIL = "shippingcompanyservice015@gmail.com";
let isAdmin = false;

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754",
  measurementId: "G-BT4DYMNWBL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);

window.show = (id)=>{
  if((id==="dashboard" || id==="admin") && !isAdmin){
    alert("Admin only 🔐");
    return;
  }
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Account created");
  }catch(e){alert(e.message);}
};

window.login = async ()=>{
  try{
    const user = await signInWithEmailAndPassword(auth,email.value,password.value);
    if(user.user.email === ADMIN_EMAIL){
      isAdmin = true;
      show("dashboard");
      loadShipments();
    } else {
      alert("Access denied");
      logout();
    }
  }catch(e){
    alert("Invalid login");
  }
};

window.logout = ()=>{
  isAdmin = false;
  signOut(auth);
  show("home");
};

function getToday(){
  const d = new Date();
  return d.toISOString().split("T")[0];
}

function addDays(days){
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().split("T")[0];
}

window.autoDate = ()=>{
  const statusVal = status.value;

  let auto = "";

  if(statusVal === "Order Received"){
    auto = getToday();
  }
  else if(statusVal === "Picked Up"){
    auto = getToday();
  }
  else if(statusVal === "In Transit"){
    auto = addDays(3);
  }
  else if(statusVal === "Arrived at Facility"){
    auto = addDays(2);
  }
  else if(statusVal === "Out for Delivery"){
    auto = getToday();
  }
  else if(statusVal === "Delivered"){
    auto = getToday();
  }

  date.value = auto;
};

window.addShipment = async ()=>{
  const locationVal = location.value.trim();
  const receiverVal = receiver.value.trim();
  const weightVal = weight.value.trim();
  const dateVal = date.value;
  const statusVal = status.value;

  if(!locationVal || !receiverVal || !weightVal || !dateVal || !statusVal){
    alert("Please fill all fields");
    return;
  }

  const code = "BW" + Math.floor(1000 + Math.random()*9000);

  await setDoc(doc(db,"shipments",code),{
    location: locationVal,
    receiver: receiverVal,
    weight: weightVal,
    deliveryDate: dateVal,
    status: statusVal,
    paid:false
  });

  alert("✅ Shipment Created: " + code);

  location.value = "";
  receiver.value = "";
  weight.value = "";
  date.value = "";
  status.value = "";

  show("dashboard");
  loadShipments();
};

async function loadShipments(){
  shipments.innerHTML="";
  const snap = await getDocs(collection(db,"shipments"));

  snap.forEach(docu=>{
    const d = docu.data();
    shipments.innerHTML += `
    <div class="card">
    <b>${docu.id}</b><br>
    ${d.location}<br>
    ${d.status}<br>
    ${d.paid ? "✅ Paid" : "❌ Not Paid"}
    </div>`;
  });
}

window.track = async ()=>{
  const codeVal = code.value.trim();

  if(!codeVal){
    alert("Enter tracking number");
    return;
  }

  const ref = doc(db,"shipments",codeVal);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    result.innerHTML="<p style='color:red'>❌ Tracking not found</p>";
    return;
  }

  const d = snap.data();

  const paymentUI = d.paid
  ? "✅ Paid"
  : `
  ❌ Not Paid<br>
  <button onclick="payEmail('${codeVal}')">Email</button>
  <a href="https://www.paypal.me/shippingcompany015" target="_blank">
  <button>PayPal</button></a>
  <button onclick="markPaid('${codeVal}')">I Paid</button>
  `;

  result.innerHTML = `
  <div class="card">
  <h2>${codeVal}</h2>
  📍 ${d.location}<br>
  👤 ${d.receiver}<br>
  📦 ${d.weight}<br>
  📅 ${d.deliveryDate}<br>
  🚚 ${d.status}<br><br>
  💳 ${paymentUI}
  </div>`;
};

window.payEmail = (code)=>{
  window.location.href =
  "mailto:shippingcompanyservice015@gmail.com?subject=Payment "+code;
};

window.markPaid = async (code)=>{
  await updateDoc(doc(db,"shipments",code),{paid:true});
  track();
  loadShipments();
};

</script>

</body>
</html>

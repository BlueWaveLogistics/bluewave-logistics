<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white;}
header{background:#ffcc00;padding:15px;display:flex;justify-content:space-between;color:black;font-weight:bold;}
.page{display:none;padding:20px;}
.active{display:block;}
input{padding:12px;margin:5px;width:90%;border-radius:10px;border:none;background:#222;color:white;}
button{padding:12px;border:none;border-radius:10px;background:#ffcc00;font-weight:bold;margin:5px;}
.card{background:#111;padding:20px;border-radius:15px;margin:10px;}
.track-box{display:flex;}
.track-box input{flex:1;}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<button onclick="show('login')">Login</button>
</header>

<!-- HOME -->
<div id="home" class="page active">
<h2>Track Shipment</h2>

<div class="track-box">
<input id="code" placeholder="Tracking code">
<button onclick="track()">Track</button>
</div>

<div id="result"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2>Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD (ADMIN ONLY) -->
<div id="dashboard" class="page">
<h2>Admin Dashboard 🔐</h2>

<button onclick="show('admin')">Add Shipment</button>
<button onclick="logout()">Logout</button>

<div id="shipments"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="page">
<h2>Add Shipment</h2>

<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">
<input id="date" placeholder="Delivery Date">
<input id="status" placeholder="Status">

<button onclick="addShipment()">Add</button>
<button onclick="show('dashboard')">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  getDocs,
  collection,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔐 ADMIN EMAIL
const ADMIN_EMAIL = "shippingcompanyservice015@gmail.com";

let isAdmin = false;

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// NAVIGATION (PROTECTED)
window.show = (id)=>{

  if((id==="dashboard" || id==="admin") && !isAdmin){
    alert("Admin access only 🔐");
    return;
  }

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// SIGNUP
window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Account created");
  }catch(e){alert(e.message);}
};

// LOGIN (ADMIN ONLY)
window.login = async ()=>{
  try{
    const user = await signInWithEmailAndPassword(auth,email.value,password.value);

    if(user.user.email === ADMIN_EMAIL){
      isAdmin = true;
      show("dashboard");
      loadShipments();
    } else {
      alert("Access denied ❌ (Not admin)");
      logout();
    }

  }catch(e){
    alert("Invalid login");
  }
};

// LOGOUT
window.logout = ()=>{
  isAdmin = false;
  signOut(auth);
  show("home");
};

// ADD SHIPMENT
window.addShipment = async ()=>{
  const code = "BW" + Math.floor(Math.random()*10000);

  await setDoc(doc(db,"shipments",code),{
    location: location.value,
    receiver: receiver.value,
    weight: weight.value,
    deliveryDate: date.value,
    status: status.value,
    paid:false
  });

  alert("Shipment created: "+code);
};

// LOAD DASHBOARD
async function loadShipments(){
  shipments.innerHTML="";
  const snap = await getDocs(collection(db,"shipments"));

  snap.forEach(docu=>{
    const d = docu.data();

    shipments.innerHTML += `
    <div class="card">
      <b>${docu.id}</b><br>
      📍 ${d.location}<br>
      🚚 ${d.status}<br>
      💳 ${d.paid ? "✅ Paid" : "❌ Not Paid"}
    </div>`;
  });
}

// TRACK
window.track = async ()=>{
  const codeVal = code.value.trim();
  const ref = doc(db,"shipments",codeVal);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    result.innerHTML="Not found";
    return;
  }

  const d = snap.data();

  const paymentUI = d.paid
  ? "✅ Paid"
  : `
  ❌ Not Paid<br>
  <button onclick="payEmail('${codeVal}')">Email</button>
  <a href="https://www.paypal.me/shippingcompany015" target="_blank">
  <button>PayPal</button></a>
  <button onclick="markPaid('${codeVal}')">I Paid</button>
  `;

  result.innerHTML = `
  <div class="card">
  <b>${codeVal}</b><br>
  📍 ${d.location}<br>
  👤 ${d.receiver}<br>
  📦 ${d.weight}<br>
  📅 ${d.deliveryDate}<br>
  🚚 ${d.status}<br><br>
  💳 ${paymentUI}
  </div>`;
};

// EMAIL PAYMENT
window.payEmail = (code)=>{
  window.location.href =
  "mailto:shippingcompanyservice015@gmail.com?subject=Payment "+code;
};

// MARK PAID
window.markPaid = async (code)=>{
  await updateDoc(doc(db,"shipments",code),{paid:true});
  track();
};

</script>

</body>
</html>

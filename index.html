<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#ffcc00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:black;
  font-weight:bold;
}

header div button{
  margin-left:10px;
}

.page{
  display:none;
  min-height:80vh;
}
.active{display:block;}

.hero{
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  background-size:cover;
  padding:120px 20px;
  text-align:center;
}

.track-box{
  display:flex;
  max-width:400px;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.track-box input{
  flex:1;
  padding:15px;
  border:none;
}

.track-box button{
  background:#ffcc00;
  border:none;
  padding:15px;
  font-weight:bold;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  border:1px solid #333;
  margin:20px;
}

.timeline{
  border-left:3px solid #444;
  margin-left:10px;
  padding-left:20px;
}

.step{
  margin:15px 0;
  position:relative;
  color:#777;
}

.step::before{
  content:"";
  position:absolute;
  left:-27px;
  top:5px;
  width:15px;
  height:15px;
  border-radius:50%;
  background:#555;
}

.step.active{
  color:#00ff88;
  font-weight:bold;
}

.step.active::before{
  background:#00ff88;
}

input, select{
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}

.footer{
  background:#111;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<div>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('login')">Login</button>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Live Shipment Tracking</h1>

<div class="track-box">
<input id="code" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
</div>
</div>

<div id="result"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2 style="padding:20px;">Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 style="padding:20px;">Admin Dashboard</h2>
<button onclick="showPage('admin')">Add Shipment</button>
<button onclick="logout()">Logout</button>
<div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="padding:20px;">Add Shipment</h2>
<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">

<select id="status">
<option>Order Received</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Arrived at Facility</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="addShipment()">Add Shipment</button>
<button onclick="showPage('dashboard')">Back</button>
</div>

<div class="footer">
© 2026 BlueWave Logistics
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754",
  measurementId: "G-BT4DYMNWBL"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let isAdmin = false;

// NAVIGATION
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
async function login(){
  const user = await auth.signInWithEmailAndPassword(email.value,password.value);
  isAdmin = (user.user.email === "shippingcompanyservice015@gmail.com");

  if(isAdmin){
    showPage("dashboard");
    loadShipments();
  }
}

// LOGOUT
function logout(){
  auth.signOut();
  showPage("home");
}

// ADD SHIPMENT
async function addShipment(){
  const code = "BW" + Math.floor(1000+Math.random()*9000);

  await db.collection("shipments").doc(code).set({
    location:location.value,
    receiver:receiver.value,
    weight:weight.value,
    status:status.value,
    paid:false
  });

  alert("Created: " + code);
}

// TRACK (WITH TIMELINE)
async function track(){

  const codeVal = code.value.trim();

  if(!codeVal){
    alert("Enter tracking number");
    return;
  }

  const snap = await db.collection("shipments").doc(codeVal).get();

  if(!snap.exists){
    result.innerHTML = "❌ Not found";
    return;
  }

  const d = snap.data();

  result.innerHTML = `
  <div class="card">
  <h2>${codeVal}</h2>

  <p>${d.location}</p>
  <p>${d.receiver}</p>
  <p>${d.weight}</p>

  <div class="timeline">
    <div class="step ${d.status==="Order Received"?"active":""}">Order Received</div>
    <div class="step ${["Picked Up","In Transit","Arrived at Facility","Out for Delivery","Delivered"].includes(d.status)?"active":""}">Picked Up</div>
    <div class="step ${["In Transit","Arrived at Facility","Out for Delivery","Delivered"].includes(d.status)?"active":""}">In Transit</div>
    <div class="step ${["Arrived at Facility","Out for Delivery","Delivered"].includes(d.status)?"active":""}">Arrived</div>
    <div class="step ${["Out for Delivery","Delivered"].includes(d.status)?"active":""}">Out for Delivery</div>
    <div class="step ${d.status==="Delivered"?"active":""}">Delivered</div>
  </div>

  </div>`;
}

// LOAD
async function loadShipments(){
  shipments.innerHTML="";
  const snap = await db.collection("shipments").get();

  snap.forEach(doc=>{
    shipments.innerHTML += `<div class="card">${doc.id}</div>`;
  });
}
</script>

</body>
</html>

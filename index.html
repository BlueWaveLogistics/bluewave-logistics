<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      background:url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
      background-size:cover;
      background-position:center;
      padding:80px 20px;
    }

    .search-box {
      background:white;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      display:flex;
      overflow:hidden;
    }

    .search-box input {
      flex:1;
      padding:12px;
      border:none;
      outline:none;
    }

    .search-box button {
      background:#ffcc00;
      border:none;
      padding:12px 20px;
      font-weight:bold;
      cursor:pointer;
    }

    /* CARDS */
    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:20px;
    }

    .card {
      background:#1a1a1a;
      padding:20px;
      border-radius:10px;
    }

    /* RESULT */
    #result {
      margin:20px;
      padding:20px;
      background:#1a1a1a;
      border-radius:10px;
      text-align:left;
      border-left:5px solid #ffcc00;
    }

    #progressContainer {
      width:80%;
      max-width:350px;
      margin:20px auto;
      background:#333;
      border-radius:20px;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#ffcc00;
      border-radius:20px;
    }

    #map {
      width:90%;
      height:320px;
      margin:20px auto;
      border-radius:10px;
    }

    .timeline {
      margin-top:15px;
      border-left:2px solid #ffcc00;
      padding-left:15px;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- HERO -->
<div class="hero">
  <h1>Track Your Shipment</h1>

  <div class="search-box">
    <input id="code" placeholder="Enter tracking number">
    <button onclick="track()">Track</button>
  </div>
</div>

<!-- FEATURES -->
<div class="grid">
  <div class="card">🚚 Fast Delivery</div>
  <div class="card">✈️ International Shipping</div>
  <div class="card">📦 Secure Packaging</div>
  <div class="card">📍 Real-Time Tracking</div>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- PROGRESS -->
<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<!-- MAP -->
<div id="map"></div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map, marker, routeLine, interval;

// INIT MAP
function initMap() {
  map = L.map('map').setView([41.9028, 12.4964], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

// DRAW ROUTE
function drawRoute(route) {
  if (routeLine) map.removeLayer(routeLine);
  routeLine = L.polyline(route, { color: 'orange', weight: 4 }).addTo(map);
}

// REAL-TIME TRUCK
function moveTruck(route) {
  if (interval) clearInterval(interval);

  let i = 0;
  let progressStep = 0;

  if (marker) map.removeLayer(marker);

  marker = L.marker(route[0]).addTo(map);

  interval = setInterval(() => {

    if (i >= route.length - 1) {
      clearInterval(interval);
      document.getElementById("progressText").innerText = "Delivered ✅";
      document.getElementById("progressBar").style.width = "100%";
      return;
    }

    let start = route[i];
    let end = route[i + 1];

    let lat = start[0] + (end[0] - start[0]) * progressStep;
    let lng = start[1] + (end[1] - start[1]) * progressStep;

    marker.setLatLng([lat, lng]);

    document.getElementById("progressText").innerText =
      `📍 Live: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

    progressStep += 0.01;

    if (progressStep >= 1) {
      progressStep = 0;
      i++;
      updateProgress(i, route.length);
    }

  }, 100);
}

// PROGRESS
function updateProgress(step, total) {
  let progress = (step / (total - 1)) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
}

// GLOBAL TRACK FUNCTION (FIXED)
window.track = function () {

  const code = document.getElementById("code").value;

  if (!code) {
    alert("Enter tracking code");
    return;
  }

  const route = [
    [41.9028, 12.4964],
    [52.52, 13.405],
    [51.5074, -0.1278],
    [40.7128, -74.0060]
  ];

  initMap();
  drawRoute(route);
  moveTruck(route);

  let timeline = `
  <div class="timeline">
    <div>📦 Shipment created - Italy</div>
    <div>🚚 Berlin transit</div>
    <div>✈️ London hub</div>
    <div>🏠 New York delivery</div>
  </div>`;

  document.getElementById("result").innerHTML = `
    <b>📦 Tracking ID:</b> ${code}<br><br>
    🚚 Live tracking started
    ${timeline}
  `;
};

// LOAD MAP
initMap();

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #000, #111, #000);
      box-shadow: 0 0 10px rgba(255,165,0,0.3);
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      padding: 40px 20px;
    }

    input {
      padding: 12px;
      margin: 5px;
      width: 70%;
      max-width: 250px;
      border-radius: 5px;
      border: none;
      background: white;
      color: black;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      background: orange;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    .timeline {
      text-align: left;
      max-width: 300px;
      margin: 20px auto;
      position: relative;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 10px;
      width: 2px;
      height: 100%;
      background: orange;
    }

    .timeline-item {
      margin-left: 30px;
      margin-bottom: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      margin: 10px auto;
      max-width: 300px;
    }

    #adminPanel {
      display: none;
    }

    #progressBar {
      transition: width 0.5s ease;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
  <button onclick="unlockAdmin()">Admin</button>
</header>

<div class="hero">
  <h1>Fast & Reliable Shipping</h1>

  <input type="text" id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <!-- PROGRESS -->
  <div style="width:80%; max-width:300px; margin:20px auto; background:#333; border-radius:20px;">
    <div id="progressBar" style="height:10px; width:0%; background:orange; border-radius:20px;"></div>
  </div>

  <p id="progressText"></p>

  <!-- MAP -->
  <div id="map" style="width:90%; height:300px; margin:20px auto;"></div>

  <!-- ADMIN -->
  <div id="adminPanel">
    <h3>Add Shipment</h3>

    <input id="newStatus" placeholder="Status">

    <div>
      <button onclick="setStatus('Pending')">Pending</button>
      <button onclick="setStatus('In Transit')">In Transit</button>
      <button onclick="setStatus('Out for Delivery')">Out</button>
      <button onclick="setStatus('Delivered')">Delivered</button>
    </div>

    <input id="newLocation" placeholder="Location">
    <button onclick="addShipment()">Add</button>
  </div>
</div>

<div>
  <div class="card">🚚 Local Delivery</div>
  <div class="card">✈️ International Shipping</div>
</div>

<!-- MAIN SCRIPT -->
<script type="module">
  // ALL your Firebase + tracking + map code here

  let map, marker;

  function initMap(lat = 6.5244, lng = 3.3792) {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 5,
      center: { lat, lng }
    });

    marker = new google.maps.Marker({
      position: { lat, lng },
      map: map
    });
  }

  window.track = async function () {
    // your tracking logic
  };

  window.unlockAdmin = function () {
    const pass = prompt("Enter admin password:");
    if (pass === "bluewave123") {
      document.getElementById("adminPanel").style.display = "block";
    } else {
      alert("Wrong password");
    }
  };
</script>

<!-- ✅ Google Maps MUST be OUTSIDE -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCa5i2j2-FP3yPBICB49lDHSrFA2II_DCo"></script>

</body>
</html>

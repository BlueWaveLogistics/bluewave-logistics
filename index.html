<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
  }

  header {
    background: #ffcc00;
    color: black;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    <p style="color:#aaa; margin-top:10px;">
  Fast. Secure. Worldwide Delivery.
</p>
  }

  h2 {
  margin-top: 40px;
  font-size: 26px;
}

  input {
  padding: 14px;
  width: 80%;
  max-width: 320px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  background: #222;
  color: white;
  font-size: 15px;
}

  <button onclick="track()" style="
  padding:14px 30px;
  background:#ffcc00;
  color:black;
  font-weight:bold;
  border-radius:8px;
  font-size:16px;
">
  Track
</button>

#result {
  margin: 20px auto;
  padding: 20px;
  max-width: 350px;
  background: #1a1a1a;
  border-radius: 12px;
  border-left: 6px solid #ffcc00;
  text-align: left;
  box-shadow: 0 5px 20px rgba(0,0,0,0.6);
}

  /* STATUS BADGE */
  .status {
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 10px;
  }

  .pending { background: gray; }
  .transit { background: orange; }
  .out { background: gold; color: black; }
  .delivered { background: green; }

  /* PROGRESS */
  #progressContainer {
    width: 80%;
    max-width: 350px;
    margin: 20px auto;
    background: #333;
    border-radius: 20px;
  }

  #progressBar {
    height: 12px;
    width: 0%;
    background: #ffcc00;
    border-radius: 20px;
    transition: 0.5s;
  }

  /* TIMELINE */
  .timeline {
    margin-top: 20px;
    border-left: 2px solid #ffcc00;
    padding-left: 15px;
  }

  .timeline-item {
    margin-bottom: 10px;
    position: relative;
  }

  .timeline-item::before {
    content: "";
    width: 10px;
    height: 10px;
    background: #ffcc00;
    border-radius: 50%;
    position: absolute;
    left: -21px;
    top: 5px;
  }
</style>
</head>

<body>

<header style="display:flex; justify-content:space-between; align-items:center;">
  <div>BlueWave Logistics 🚚</div>
  <button style="
    background:black;
    color:#ffcc00;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
  ">
    Admin
  </button>
</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<button onclick="track()">Track</button>

<div id="loader" style="display:none; margin-top:15px;">
  <div style="
    width:30px;
    height:30px;
    border:4px solid #333;
    border-top:4px solid #ffcc00;
    border-radius:50%;
    margin:auto;
    animation: spin 1s linear infinite;
  "></div>
  <p style="color:#aaa;">Tracking shipment...</p>
</div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<!-- ADMIN -->
<div id="adminPanel" class="card">
  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>

  <input id="newStatus" placeholder="Status">

  <div>
    <button onclick="setStatus('Pending')">Pending</button>
    <button onclick="setStatus('In Transit')">Transit</button>
    <button onclick="setStatus('Out for Delivery')">Out</button>
    <button onclick="setStatus('Delivered')">Delivered</button>
  </div>

  <button onclick="addShipment()">Add Shipment</button>
</div>

<script>

// STORAGE
let counter = 1000;

let shipments = {
  "BW1001": {
    status: "In Transit",
    location: "New York, USA",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: [
      "Shipment created - Lagos",
      "Picked up by BlueWave",
      "In transit to USA"
    ]
  }
};

// STATUS BUTTON
<div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
  <button onclick="setStatus('Pending')">Pending</button>
  <button onclick="setStatus('In Transit')">Transit</button>
  <button onclick="setStatus('Out for Delivery')">Out</button>
  <button onclick="setStatus('Delivered')">Delivered</button>
</div>

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (data) {

    let statusClass = "";

if (data.status === "Pending") statusClass = "pending";
else if (data.status === "In Transit") statusClass = "transit";
else if (data.status === "Out for Delivery") statusClass = "out";
else if (data.status === "Delivered") statusClass = "delivered";

let statusHTML = `<div class="status ${statusClass}">${data.status}</div>`;

// Result
document.getElementById("result").innerHTML =
  statusHTML + `
  <b>📍 Location:</b> ${data.location}<br>
  <b>📦 Sender:</b> ${data.sender}<br>
  <b>👤 Receiver:</b> ${data.receiver}<br>
  <b>⚖️ Weight:</b> ${data.weight}<br>
  <b>📅 Delivery:</b> ${data.deliveryDate}<br>
  ` + historyHTML;

// ADD SHIPMENT ✅ FIXED
function addShipment() {
  counter++;
  const code = "BW" + counter;

  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  let history = [];
  history.push(status + " - " + location);

  shipments[code] = {
    status,
    location,
    sender: document.getElementById("newSender").value,
    receiver: document.getElementById("newReceiver").value,
    weight: document.getElementById("newWeight").value,
    deliveryDate: document.getElementById("newDate").value,
    history
  };

  alert("Shipment created: " + code);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      padding: 40px 20px;
    }

    input {
      padding: 14px;
      width: 80%;
      max-width: 300px;
      border-radius: 8px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 14px 20px;
      border-radius: 8px;
      background: #ffcc00;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      text-align: left;
      border-left: 6px solid #ffcc00;
    }

    #progressContainer {
      width: 80%;
      max-width: 300px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
      transition: 0.5s;
    }

    .timeline {
      margin-top: 15px;
      border-left: 2px solid #ffcc00;
      padding-left: 15px;
    }

    .timeline-item {
      margin-bottom: 10px;
    }

    #map {
      width: 90%;
      height: 300px;
      margin: 20px auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<div class="hero">
  <h2>Track Your Shipment</h2>

  <input id="code" placeholder="Enter tracking number">
  <br>
  <button onclick="track()">Track</button>
</div>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<div id="map"></div>

<script>

// MAP
let map, marker;

function initMap(lat = 6.5244, lng = 3.3792) {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 5,
    center: { lat, lng }
  });

  marker = new google.maps.Marker({
    position: { lat, lng },
    map: map
  });
}

// MOVE TRUCK
function moveTruck(lat, lng) {
  let step = 0;

  const interval = setInterval(() => {
    step += 0.01;

    marker.setPosition({
      lat: lat + step,
      lng: lng + step
    });

    if (step > 1) clearInterval(interval);
  }, 200);
}

// TRACK
function track() {
  const code = document.getElementById("code").value;

  const locations = {
    "New York": [40.7128, -74.0060],
    "London": [51.5074, -0.1278],
    "Berlin": [52.52, 13.405],
    "Paris": [48.8566, 2.3522]
  };

  const cities = Object.keys(locations);
  const city = cities[Math.floor(Math.random() * cities.length)];
  const coords = locations[city];

  initMap(coords[0], coords[1]);
  moveTruck(coords[0], coords[1]);

  const statuses = ["Pending", "In Transit", "Out for Delivery", "Delivered"];
  const status = statuses[Math.floor(Math.random() * statuses.length)];

  let progress = 25;
  if (status === "In Transit") progress = 50;
  if (status === "Out for Delivery") progress = 75;
  if (status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";

  let history = `
    <div class="timeline">
      <div class="timeline-item">Shipment created - Italy</div>
      <div class="timeline-item">${status}</div>
    </div>
  `;

  document.getElementById("result").innerHTML = `
    <b>📦 ${code}</b><br><br>
    📍 Location: ${city}<br>
    📦 Status: ${status}<br>
    ${status === "Out for Delivery" ? "🚚 Arriving Today<br>" : ""}
    ${history}
  `;
}

// DEFAULT MAP
initMap();

</script>

<!-- GOOGLE MAP -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1f3a;
      color: white;
      text-align: center;
    }

    header {
      background: #08172b;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      padding: 40px 20px;
    }

    input {
      padding: 12px;
      margin: 5px;
      width: 70%;
      max-width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 12px 20px;
      background: orange;
      border: none;
      color: white;
      border-radius: 5px;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: #122b4a;
      border-radius: 10px;
    }

    .card {
      background: #122b4a;
      margin: 10px auto;
      padding: 15px;
      border-radius: 8px;
      max-width: 300px;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<div class="hero">
  <h1>Fast & Reliable Shipping</h1>

  <div>
    <input type="text" id="code" placeholder="Enter tracking code">
    <button onclick="track()">Track</button>
  </div>

  <h3>Add Shipment</h3>
  <input id="newCode" placeholder="Code">
  <input id="newStatus" placeholder="Status">
  <input id="newLocation" placeholder="Location">
  <button onclick="addShipment()">Add</button>

  <p id="result"></p>
</div>

<div>
  <div class="card">🚚 Local Delivery</div>
  <div class="card">✈️ International Shipping</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } 
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANv_xiv_AgddM9hACDSEH8PEb8Z2JFIvU",
    authDomain: "bluewave-logistics-c9a21.firebaseapp.com",
    projectId: "bluewave-logistics-c9a21",
    storageBucket: "bluewave-logistics-c9a21.firebasestorage.app",
    messagingSenderId: "388186247669",
    appId: "1:388186247669:web:a28394e0e82bd499e410bc",
    measurementId: "G-KY76SYQQV0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // TRACK FUNCTION
  window.track = async function () {
    const input = document.getElementById("code").value;
    const docRef = doc(db, "shipments", input);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      let historyHTML = "";
      if (data.history) {
        data.history.forEach(item => {
          historyHTML += "📍 " + item + "<br>";
        });
      }

      document.getElementById("result").innerHTML =
        "Status: " + data.status + "<br>" +
        "Location: " + data.location + "<br><br>" +
        historyHTML;
    } else {
      document.getElementById("result").innerText = "Tracking code not found";
    }
  };

  // ADD SHIPMENT FUNCTION
  window.addShipment = async function () {
    const code = document.getElementById("newCode").value;

    await setDoc(doc(db, "shipments", code), {
      code: code,
      status: document.getElementById("newStatus").value,
      location: document.getElementById("newLocation").value
    });

    alert("Shipment added!");
  };
</script>

</body>
</html>

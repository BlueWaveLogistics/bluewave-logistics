<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* HEADER */
    header {
      background: #ffcc00;
      color: black;
      padding: 15px 20px;
      font-weight: bold;
      font-size: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* HERO */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
      url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
      background-size: cover;
      padding: 50px 20px;
      text-align: center;
    }

    .hero h1 {
      margin-bottom: 20px;
    }

    .track-box {
      background: white;
      padding: 10px;
      border-radius: 8px;
      display: inline-flex;
      width: 90%;
      max-width: 400px;
    }

    .track-box input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    .track-box button {
      background: #ffcc00;
      border: none;
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
    }

    /* RESULT CARD */
    #result {
      margin: 20px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      border-left: 6px solid #ffcc00;
    }

    /* STATUS BADGE */
    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 10px;
    }

    .pending { background: gray; }
    .transit { background: orange; }
    .out { background: gold; color: black; }
    .delivered { background: green; }

    /* PROGRESS */
    #progressContainer {
      margin: 20px;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
      transition: 0.5s;
    }

    /* TIMELINE */
    .timeline {
      margin-top: 20px;
      border-left: 2px solid #ffcc00;
      padding-left: 15px;
    }

    .timeline-item {
      margin-bottom: 10px;
      position: relative;
    }

    .timeline-item::before {
      content: "";
      width: 10px;
      height: 10px;
      background: #ffcc00;
      border-radius: 50%;
      position: absolute;
      left: -21px;
      top: 5px;
    }

    /* SERVICES */
    .services {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 20px;
    }

    .service {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      background: #000;
      padding: 20px;
      text-align: center;
      border-top: 2px solid #ffcc00;
    }

  </style>
</head>

<body>

<header>
  <div>BlueWave Logistics 🚚</div>
  <div>Express Delivery</div>
</header>

<div class="hero">
  <h1>Track Your Shipment</h1>

  <div class="track-box">
    <input id="code" placeholder="Enter tracking number">
    <button onclick="track()">Track</button>
  </div>
</div>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<!-- SERVICES -->
<div class="services">
  <div class="service">🚚 Fast Delivery</div>
  <div class="service">✈️ International Shipping</div>
  <div class="service">📦 Secure Packaging</div>
  <div class="service">📍 Real-Time Tracking</div>
</div>

<footer>
  <p>📧 support@bluewavelogistics.com</p>
  <p>© 2026 BlueWave Logistics</p>
</footer>

<script>

// AUTO SYSTEM
function track() {
  const code = document.getElementById("code").value;

  const statuses = ["Pending", "In Transit", "Out for Delivery", "Delivered"];
  const status = statuses[Math.floor(Math.random()*statuses.length)];

  let statusClass = "";
  if (status === "Pending") statusClass = "pending";
  if (status === "In Transit") statusClass = "transit";
  if (status === "Out for Delivery") statusClass = "out";
  if (status === "Delivered") statusClass = "delivered";

  let history = `
    <div class="timeline">
      <div class="timeline-item">Shipment created - Italy</div>
      <div class="timeline-item">${status}</div>
    </div>
  `;

  let progress = 25;
  if (status === "In Transit") progress = 50;
  if (status === "Out for Delivery") progress = 75;
  if (status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";

  document.getElementById("result").innerHTML = `
    <div class="status ${statusClass}">${status}</div>
    <br>
    📦 ${code}<br>
    📍 Location: ${["New York","London","Berlin"][Math.floor(Math.random()*3)]}
    ${history}
  `;
}

</script>

</body>
</html>

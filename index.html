<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LEAFLET CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    input {
      padding: 14px;
      width: 80%;
      max-width: 300px;
      border-radius: 8px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 14px 20px;
      border-radius: 8px;
      background: #ffcc00;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      text-align: left;
      border-left: 6px solid #ffcc00;
    }

    #progressContainer {
      width: 80%;
      max-width: 300px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
      transition: 0.5s;
    }

    .timeline {
      margin-top: 15px;
      border-left: 2px solid #ffcc00;
      padding-left: 15px;
    }

    .timeline-item {
      margin-bottom: 10px;
    }

    #map {
      width: 90%;
      height: 320px;
      margin: 20px auto;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<div id="map"></div>

<!-- LEAFLET JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map, marker, routeLine;

// INIT MAP
function initMap() {
  map = L.map('map').setView([41.9028, 12.4964], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

// DRAW ROUTE
function drawRoute(route) {
  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(route, { color: 'orange' }).addTo(map);
}

// MOVE TRUCK
function moveTruck(route) {
  let index = 0;

  if (marker) map.removeLayer(marker);

  marker = L.marker(route[0]).addTo(map);

  const interval = setInterval(() => {
    index++;

    if (index >= route.length) {
      clearInterval(interval);
      return;
    }

    marker.setLatLng(route[index]);
  }, 1500);
}

// TRACK FUNCTION
function track() {
  const code = document.getElementById("code").value;

  // ROUTE (MULTI-STOPS)
  const route = [
    [41.9028, 12.4964], // Italy
    [52.52, 13.405],    // Berlin
    [51.5074, -0.1278], // London
    [40.7128, -74.0060] // New York
  ];

  initMap();
  drawRoute(route);
  moveTruck(route);

  // RANDOM STATUS
  const statuses = ["Pending", "In Transit", "Out for Delivery", "Delivered"];
  const status = statuses[Math.floor(Math.random()*statuses.length)];

  let progress = 25;
  if (status === "In Transit") progress = 50;
  if (status === "Out for Delivery") progress = 75;
  if (status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";

  // TIMELINE
  let historyHTML = `<div class="timeline">
    <div class="timeline-item">Italy Warehouse</div>
    <div class="timeline-item">Berlin Facility</div>
    <div class="timeline-item">London Hub</div>
    <div class="timeline-item">New York Destination</div>
  </div>`;

  // RESULT
  document.getElementById("result").innerHTML = `
    <b>📦 ${code}</b><br><br>
    📦 Status: ${status}<br><br>
    ${historyHTML}
  `;
}

// LOAD MAP
initMap();

</script>

</body>
</html>

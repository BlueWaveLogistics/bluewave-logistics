<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #000, #111, #000);
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    input {
      padding: 12px;
      width: 70%;
      max-width: 250px;
      border-radius: 5px;
      border: none;
      margin: 5px;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      background: orange;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .timeline {
      text-align: left;
      margin-top: 10px;
    }

    .timeline-item::before {
      content: "📍 ";
    }

    #progressContainer {
      width: 80%;
      max-width: 300px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: orange;
      border-radius: 20px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
  <button onclick="unlockAdmin()">Admin</button>
</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>

  <input id="newStatus" placeholder="Status">

  <!-- STATUS BUTTONS -->
  <div>
    <button onclick="setStatus('Pending')">Pending</button>
    <button onclick="setStatus('In Transit')">Transit</button>
    <button onclick="setStatus('Out for Delivery')">Out</button>
    <button onclick="setStatus('Delivered')">Delivered</button>
  </div>

  <button onclick="addShipment()">Add Shipment</button>
</div>

<script>

// LOAD STORAGE
let shipments = JSON.parse(localStorage.getItem("shipments")) || {};
let counter = JSON.parse(localStorage.getItem("counter")) || 1000;

function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
  localStorage.setItem("counter", JSON.stringify(counter));
}

// SET STATUS BUTTON
function setStatus(status) {
  document.getElementById("newStatus").value = status;
}

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (data) {

    // TIMELINE
    let historyHTML = "";
    data.history.forEach(item => {
      historyHTML += `<div class="timeline-item">${item}</div>`;
    });

    historyHTML = `<div class="timeline">${historyHTML}</div>`;

    // PROGRESS
    let progress = 0;
    if (data.status === "Pending") progress = 25;
    else if (data.status === "In Transit") progress = 50;
    else if (data.status === "Out for Delivery") progress = 75;
    else if (data.status === "Delivered") progress = 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").innerText =
      "Progress: " + progress + "%";

    // RESULT
    document.getElementById("result").innerHTML =
      `<b>Status:</b> ${data.status}<br>
       <b>Location:</b> ${data.location}<br>
       <b>Sender:</b> ${data.sender}<br>
       <b>Receiver:</b> ${data.receiver}<br>
       <b>Weight:</b> ${data.weight}<br>
       <b>Delivery Date:</b> ${data.deliveryDate}<br><br>` +
      historyHTML;

  } else {
    document.getElementById("result").innerText = "Tracking code not found";
  }
}

// ADMIN LOGIN
function unlockAdmin() {
  const pass = prompt("Enter admin password:");
  if (pass === "bluewave123") {
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

// ADD SHIPMENT
function addShipment() {

  counter++;
  const code = "BW" + counter;

  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  let history = [];

  if (status === "Pending") history.push("Shipment created - " + location);
  if (status === "In Transit") history.push("In transit - " + location);
  if (status === "Out for Delivery") history.push("Out for delivery - " + location);
  if (status === "Delivered") history.push("Delivered - " + location);

  shipments[code] = {
    status,
    location,
    sender: document.getElementById("newSender").value,
    receiver: document.getElementById("newReceiver").value,
    weight: document.getElementById("newWeight").value,
    deliveryDate: document.getElementById("newDate").value,
    history
  };

  saveData();

  alert("Shipment created! Code: " + code);
}

</script>

</body>
</html>

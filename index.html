<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #000, #111, #000);
      box-shadow: 0 0 10px rgba(255,165,0,0.3);
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      padding: 40px 20px;
    }

    input {
      padding: 12px;
      margin: 5px;
      width: 70%;
      max-width: 250px;
      border-radius: 5px;
      border: none;
      background: white;
      color: black;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      background: orange;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff9900;
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    .timeline {
      text-align: left;
      max-width: 300px;
      margin: 20px auto;
      position: relative;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 10px;
      width: 2px;
      height: 100%;
      background: orange;
    }

    .timeline-item {
      margin-left: 30px;
      margin-bottom: 15px;
      position: relative;
    }

    .timeline-item::before {
      content: "📍";
      position: absolute;
      left: -20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      margin: 10px auto;
      max-width: 300px;
    }

    #adminPanel {
      display: none;
    }

    #progressBar {
      transition: width 0.5s ease;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
  <button onclick="unlockAdmin()">Admin</button>
</header>

<div class="hero">
  <h1>Fast & Reliable Shipping</h1>

  <!-- TRACK -->
  <input type="text" id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <!-- RESULT -->
  <div id="result"></div>

  <!-- PROGRESS -->
<div id="progressContainer" style="width:80%; max-width:300px; margin:20px auto; background:#333; border-radius:20px;">
  <div id="progressBar" style="height:10px; width:0%; background:orange; border-radius:20px;"></div>
</div>

<p id="progressText"></p>

<!-- ✅ MAP GOES HERE -->
<div id="map" style="width:90%; height:300px; margin:20px auto; border-radius:10px;"></div>

  <div id="adminPanel">
    <h3>Add Shipment</h3>

    <input id="newStatus" placeholder="Status">

    <div>
      <button onclick="setStatus('Pending')">Pending</button>
      <button onclick="setStatus('In Transit')">In Transit</button>
      <button onclick="setStatus('Out for Delivery')">Out</button>
      <button onclick="setStatus('Delivered')">Delivered</button>
    </div>

    <input id="newLocation" placeholder="Location">
    <button onclick="addShipment()">Add</button>
  </div>
</div>

<div>
  <div class="card">🚚 Local Delivery</div>
  <div class="card">✈️ International Shipping</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANv_xiv_AgddM9hACDSEH8PEb8Z2JFIvU",
    authDomain: "bluewave-logistics-c9a21.firebaseapp.com",
    projectId: "bluewave-logistics-c9a21",
    storageBucket: "bluewave-logistics-c9a21.firebasestorage.app",
    messagingSenderId: "388186247669",
    appId: "1:388186247669:web:a28394e0e82bd499e410bc",
    measurementId: "G-KY76SYQQV0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
let map, marker;

function initMap(lat = 6.5244, lng = 3.3792) {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 5,
    center: { lat, lng }
  });

  marker = new google.maps.Marker({
    position: { lat, lng },
    map: map
  });
}
  // TRACK
  window.track = async function () {
    const input = document.getElementById("code").value;
    const docRef = doc(db, "shipments", input);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();
      
if (data.location.includes("New York")) initMap(40.7128, -74.0060);
else if (data.location.includes("Berlin")) initMap(52.52, 13.405);
else if (data.location.includes("London")) initMap(51.5074, -0.1278);
else initMap(); // default
      let historyHTML = "";
      if (data.history) {
        data.history.forEach(item => {
          historyHTML += `<div class="timeline-item">${item}</div>`;
        });
      }

      historyHTML = `<div class="timeline">${historyHTML}</div>`;

      let statusColor = "white";

      if (data.status === "Delivered") statusColor = "lightgreen";
      else if (data.status === "In Transit") statusColor = "orange";
      else if (data.status === "Pending") statusColor = "gray";
      else if (data.status === "Out for Delivery") statusColor = "yellow";

      let progress = 0;
      if (data.status === "Pending") progress = 25;
      else if (data.status === "In Transit") progress = 50;
      else if (data.status === "Out for Delivery") progress = 75;
      else if (data.status === "Delivered") progress = 100;

      const bar = document.getElementById("progressBar");
      bar.style.width = progress + "%";

      if (progress === 100) bar.style.background = "green";
      else if (progress >= 50) bar.style.background = "orange";
      else bar.style.background = "gray";

      document.getElementById("progressText").innerText = "Progress: " + progress + "%";

      document.getElementById("result").innerHTML =
        `<span style="color:${statusColor}; font-weight:bold;">
          Status: ${data.status}
        </span><br>
        Location: ${data.location}<br><br>` +
        historyHTML;

    } else {
      document.getElementById("result").innerText = "Tracking code not found";
    }
  };

  // SET STATUS BUTTON
  window.setStatus = function(status) {
    document.getElementById("newStatus").value = status;
  };

  // ADD SHIPMENT
window.addShipment = async function () {
  const code = "BW" + Math.floor(1000 + Math.random() * 9000);
  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  let history = [];

  if (status === "Pending") history.push("Shipment created - " + location);
  if (status === "In Transit") history.push("In transit - " + location);
  if (status === "Out for Delivery") history.push("Out for delivery - " + location);
  if (status === "Delivered") history.push("Delivered - " + location);

  await setDoc(doc(db, "shipments", code), {
    code,
    status,
    location,
    history
  });

  alert("Shipment added! Code: " + code);
};
  // ADMIN LOGIN
  window.unlockAdmin = function () {
    const pass = prompt("Enter admin password:");

    if (pass === "bluewave123") {
      document.getElementById("adminPanel").style.display = "block";
      alert("Admin unlocked");
    } else {
      alert("Wrong password");
    }
  };
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDq9q680aigFQ2Urqy1yAheE19TS99xdIs"></script>

</body>
</html>

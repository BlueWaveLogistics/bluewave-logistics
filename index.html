<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueWave Logistics</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:white;
  text-align:center;
}

header {
  background:#ffcc00;
  color:black;
  padding:15px;
  font-weight:bold;
}

input {
  padding:12px;
  margin:10px;
  width:85%;
  max-width:320px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button {
  padding:12px;
  background:#ffcc00;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.card {
  margin:15px auto;
  padding:15px;
  max-width:350px;
  background:#1a1a1a;
  border-left:5px solid #ffcc00;
  border-radius:12px;
  text-align:left;
}

.hidden { display:none; }

.logout {
  background:red;
  color:white;
}
</style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button><br>
  <button onclick="showSignup()">Create Account</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="hidden">
  <h2>Sign Up</h2>
  <input id="signupEmail" placeholder="Email"><br>
  <input id="signupPass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Create</button><br>
  <button onclick="showLogin()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h2>Track Shipment</h2>
<input id="codeInput" placeholder="Tracking code"><br>
<button onclick="track()">Track</button>

<div id="result"></div>
<div id="mapBox"></div>

<h3>My Shipments</h3>
<div id="myShipments"></div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
  <h3>Add Shipment (Admin)</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver Email"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>

  <button onclick="addShipment()">Add Shipment</button>
</div>

<br>
<button onclick="logout()" class="logout">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔑 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// 🔐 SET ADMIN EMAIL
const ADMIN_EMAIL = "your@email.com";

// UI SWITCH
window.showSignup = () => {
  loginBox.classList.add("hidden");
  signupBox.classList.remove("hidden");
};

window.showLogin = () => {
  signupBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
};

window.showDashboard = () => {
  loginBox.classList.add("hidden");
  signupBox.classList.add("hidden");
  dashboard.classList.remove("hidden");
};

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if(user){
    showDashboard();
    loadMyShipments(user.email);

    if(user.email === ADMIN_EMAIL){
      adminPanel.classList.remove("hidden");
    }
  }
});

// SIGNUP
window.signup = async () => {
  try{
    await createUserWithEmailAndPassword(auth, signupEmail.value, signupPass.value);
    alert("Account created");
  }catch(e){
    alert(e.message);
  }
};

// LOGIN
window.login = async () => {
  try{
    await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
  }catch(e){
    alert(e.message);
  }
};

// LOGOUT
window.logout = () => {
  signOut(auth);
  location.reload();
};

// ADD SHIPMENT
window.addShipment = async () => {

  const code = "BW" + Date.now().toString().slice(-6);

  await setDoc(doc(db,"shipments",code),{
    owner:newReceiver.value.toLowerCase(),
    location:newLocation.value,
    sender:newSender.value,
    receiver:newReceiver.value,
    weight:newWeight.value,
    deliveryDate:newDate.value,
    status:"Pending",
    history:["Shipment created"]
  });

  alert("Created: "+code);
};

// TRACK
window.track = async () => {

  const code = codeInput.value;
  const docSnap = await getDoc(doc(db,"shipments",code));

  if(!docSnap.exists()){
    result.innerHTML="<div class='card'>❌ Not found</div>";
    return;
  }

  const data = docSnap.data();

  let historyHTML = "";
  data.history.forEach(h=>{
    historyHTML += `<div>• ${h}</div>`;
  });

  result.innerHTML = `
  <div class="card">
    <b>${code}</b><br><br>

    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.weight}<br>
    📅 ${data.deliveryDate}<br><br>

    🚚 <b>${data.status}</b><br><br>

    <b>Timeline</b><br>
    ${historyHTML}

    <br><br>

    <button onclick="updateStatus('${code}','In transit')">Transit</button>
    <button onclick="updateStatus('${code}','Out for delivery')">Out</button>
    <button onclick="updateStatus('${code}','Delivered')">Delivered</button>
  </div>
  `;

  simulateMap(data.status);
};

// UPDATE STATUS
window.updateStatus = async (code,status)=>{

  const ref = doc(db,"shipments",code);
  const snap = await getDoc(ref);

  let data = snap.data();
  let history = data.history || [];

  history.push(status);

  await updateDoc(ref,{
    status:status,
    history:history
  });

  track();
};

// LOAD USER SHIPMENTS
async function loadMyShipments(email){

  const q = query(collection(db,"shipments"),where("owner","==",email.toLowerCase()));
  const snap = await getDocs(q);

  let html = "";

  snap.forEach(doc=>{
    const d = doc.data();

    html += `
      <div class="card">
        <b>${doc.id}</b><br>
        ${d.status}<br>
        ${d.location}
      </div>
    `;
  });

  myShipments.innerHTML = html || "No shipments yet";
}

// 🚚 LIVE SIMULATION
function simulateMap(status){

  let msg = "";

  if(status==="Pending") msg="📦 Preparing shipment...";
  if(status==="In transit") msg="🚚 Moving to destination...";
  if(status==="Out for delivery") msg="📍 Near your location...";
  if(status==="Delivered") msg="✅ Delivered successfully";

  mapBox.innerHTML = `<div class="card">${msg}</div>`;
}

</script>

</body>
</html>

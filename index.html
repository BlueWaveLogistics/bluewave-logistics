<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    input {
      padding: 12px;
      width: 80%;
      max-width: 300px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px 20px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px auto;
      padding: 20px;
      max-width: 350px;
      background: #141414;
      border-left: 4px solid #ffcc00;
      border-radius: 12px;
      text-align: left;
    }

    .timeline {
      margin-top: 10px;
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
    }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
      transition: 0.5s;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="./logo.png" style="height:40px;">
    <b>BlueWave Logistics</b>
  </div>

  <button onclick="unlockAdmin()">Admin</button>
</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>
  <input id="newStatus" placeholder="Status"><br>

  <button onclick="addShipment()">Add Shipment</button>
</div>

<script>

// LOAD DATA
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status: "In Transit",
    location: "New York, USA",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: ["Shipment created - Italy", "In transit"]
  }
};

let counter = Object.keys(shipments).length + 1000;

// SAVE FUNCTION
function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    document.getElementById("result").innerHTML = "Tracking not found";
    return;
  }

  let historyHTML = "";
  data.history.forEach(item => {
    historyHTML += `<div>${item}</div>`;
  });

  let progress = 0;
  if (data.status === "Pending") progress = 25;
  else if (data.status === "In Transit") progress = 50;
  else if (data.status === "Out for Delivery") progress = 75;
  else if (data.status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";
  document.getElementById("progressText").innerText =
    "Progress: " + progress + "%";

  document.getElementById("result").innerHTML = `
    <b>Status:</b> ${data.status}<br>
    <b>Location:</b> ${data.location}<br>
    <b>Sender:</b> ${data.sender}<br>
    <b>Receiver:</b> ${data.receiver}<br>
    <b>Weight:</b> ${data.weight}<br>
    <b>Date:</b> ${data.deliveryDate}<br>
    <div class="timeline">${historyHTML}</div>
  `;
}

// ADMIN LOGIN
function unlockAdmin() {
  const pass = prompt("Enter admin password:");
  if (pass === "admin123") {
    document.getElementById("adminPanel").style.display = "block";
  }
}

// ADD SHIPMENT
function addShipment() {
  counter++;
  const code = "BW" + counter;

  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  shipments[code] = {
    status,
    location,
    sender: document.getElementById("newSender").value,
    receiver: document.getElementById("newReceiver").value,
    weight: document.getElementById("newWeight").value,
    deliveryDate: document.getElementById("newDate").value,
    history: [status + " - " + location]
  };

  saveData();

  alert("Shipment created: " + code);
}

</script>

</body>
</html>

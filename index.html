<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    header {
      background:#ffcc00;
      color:black;
      padding:15px;
      font-weight:bold;
    }

    input {
      padding:12px;
      margin:10px;
      width:80%;
      max-width:300px;
      border:none;
      border-radius:8px;
    }

    button {
      padding:12px 20px;
      background:#ffcc00;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .hidden { display:none; }

    #result {
      margin:20px auto;
      padding:20px;
      max-width:350px;
      background:#1a1a1a;
      border-left:5px solid #ffcc00;
      border-radius:12px;
      text-align:left;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <p>Don't have account?</p>
  <button onclick="showSignup()">Sign Up</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="hidden">
  <h2>Create Account</h2>
  <input id="signupEmail" placeholder="Email"><br>
  <input id="signupPass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Create Account</button>
  <button onclick="showLogin()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h2>Track Shipment</h2>
  <input id="code" placeholder="Tracking code"><br>
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <h3>Your Shipments</h3>
  <div id="myShipments"></div>

  <button onclick="logout()" style="background:red;color:white;">Logout</button>
</div>

<script>

// USERS + SHIPMENTS DATABASE
let users = JSON.parse(localStorage.getItem("users")) || {};
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    user:"test@gmail.com",
    status:"In Transit",
    location:"New York",
    receiver:"John",
    weight:"5kg",
    history:["Created - Italy","Transit"]
  }
};

// SAVE
function saveAll(){
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// NAVIGATION
function showSignup(){
  loginBox.style.display="none";
  signupBox.style.display="block";
}

function showLogin(){
  signupBox.style.display="none";
  loginBox.style.display="block";
}

// SIGNUP
function signup(){
  const email=signupEmail.value;
  const pass=signupPass.value;

  if(users[email]){
    alert("User exists");
    return;
  }

  users[email]={password:pass};
  saveAll();
  alert("Account created!");
  showLogin();
}

// LOGIN
function login(){
  const email=loginEmail.value;
  const pass=loginPass.value;

  if(!users[email] || users[email].password!==pass){
    alert("Invalid login");
    return;
  }

  localStorage.setItem("currentUser", email);
  showDashboard();
}

// SHOW DASHBOARD
function showDashboard(){
  loginBox.style.display="none";
  signupBox.style.display="none";
  dashboard.style.display="block";

  loadUserShipments();
}

// AUTO LOGIN
if(localStorage.getItem("currentUser")){
  showDashboard();
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// LOAD USER SHIPMENTS
function loadUserShipments(){
  const user=localStorage.getItem("currentUser");

  let html="";

  for(let code in shipments){
    if(shipments[code].user===user){
      html+=`<div style="margin:10px;">📦 ${code} - ${shipments[code].status}</div>`;
    }
  }

  myShipments.innerHTML=html || "No shipments";
}

// TRACK
function track(){
  const code=document.getElementById("code").value;
  const data=shipments[code];

  if(!data){
    result.innerHTML="❌ Not found";
    return;
  }

  result.innerHTML=`
    <b>${code}</b><br>
    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.weight}<br>
    <br>${data.history.join("<br>")}
  `;
}

</script>

</body>
</html>

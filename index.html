<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-weight: bold;
      font-size: 20px;
    }

    .hero {
      background:url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
      background-size:cover;
      padding:80px 20px;
    }

    .search-box {
      background:white;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      display:flex;
      overflow:hidden;
    }

    .search-box input {
      flex:1;
      padding:12px;
      border:none;
      outline:none;
    }

    .search-box button {
      background:#ffcc00;
      border:none;
      padding:12px;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:20px;
    }

    .card {
      background:#1a1a1a;
      padding:20px;
      border-radius:10px;
    }

    #result {
      margin:20px;
      padding:20px;
      background:#1a1a1a;
      border-left:5px solid #ffcc00;
      border-radius:10px;
      text-align:left;
    }

    .timeline {
      border-left:2px solid #ffcc00;
      padding-left:10px;
      margin-top:10px;
    }

    #progressContainer {
      width:80%;
      margin:auto;
      background:#333;
      border-radius:20px;
    }

    #progressBar {
      height:10px;
      width:0%;
      background:#ffcc00;
      border-radius:20px;
    }

    #map {
      width:90%;
      height:320px;
      margin:20px auto;
      border-radius:10px;
      display:none;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<div class="hero">
  <h1>Live Shipment Tracking</h1>

  <div class="search-box">
    <input id="code" placeholder="Enter tracking number">
    <button onclick="track()">Track</button>
  </div>
</div>

<div class="grid">
  <div class="card">🚚 Fast Delivery</div>
  <div class="card">✈️ International Shipping</div>
  <div class="card">📦 Secure Packaging</div>
  <div class="card">📍 Real-Time Tracking</div>
</div>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<div id="map"></div>

<script>

let map, marker, routeLine, interval;

// MULTIPLE SHIPMENTS
let shipments = {

  "BW1001": {
    route: [
      [41.9028, 12.4964],
      [48.8566, 2.3522],
      [52.52, 13.405],
      [51.5074, -0.1278],
      [40.7128, -74.0060]
    ],
    history: ["Italy created", "Paris transit", "Berlin hub", "London hub"]
  },

  "BW1002": {
    route: [
      [45.4642, 9.19],
      [50.1109, 8.6821],
      [52.52, 13.405],
      [59.3293, 18.0686]
    ],
    history: ["Milan", "Frankfurt", "Berlin", "Stockholm"]
  },

  "BW1003": {
    route: [
      [40.4168, -3.7038],
      [48.8566, 2.3522],
      [51.5074, -0.1278],
      [40.7128, -74.0060]
    ],
    history: ["Madrid", "Paris", "London", "USA"]
  }

};

// MAP INIT
function initMap() {
  map = L.map('map').setView([45, 10], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);
}

// DRAW ROUTE
function drawRoute(route) {
  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(route, {
    color: '#ffcc00',
    weight: 5
  }).addTo(map);

  map.fitBounds(route);
}

// MOVE TRUCK
function moveTruck(route) {

  if (interval) clearInterval(interval);

  let i = 0;
  let progress = 0;

  const truckIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/1995/1995470.png",
    iconSize: [40, 40]
  });

  marker = L.marker(route[0], { icon: truckIcon }).addTo(map);

  interval = setInterval(() => {

    if (i >= route.length - 1) {
      clearInterval(interval);
      document.getElementById("progressText").innerText = "Delivered ✅";
      document.getElementById("progressBar").style.width = "100%";
      return;
    }

    let start = route[i];
    let end = route[i + 1];

    let lat = start[0] + (end[0] - start[0]) * progress;
    let lng = start[1] + (end[1] - start[1]) * progress;

    marker.setLatLng([lat, lng]);

    document.getElementById("progressText").innerText =
      `📍 ${lat.toFixed(3)}, ${lng.toFixed(3)}`;

    progress += 0.02;

    if (progress >= 1) {
      progress = 0;
      i++;
      updateProgress(i, route.length);
    }

  }, 100);
}

// PROGRESS
function updateProgress(step, total) {
  let percent = (step / (total - 1)) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

// TRACK
function track() {

  const code = document.getElementById("code").value.trim();

  if (!shipments[code]) {
    document.getElementById("result").innerHTML = "❌ Tracking not found";
    return;
  }

  const data = shipments[code];

  document.getElementById("map").style.display = "block";

  initMap();
  drawRoute(data.route);
  moveTruck(data.route);

  let historyHTML = "<div class='timeline'>";
  data.history.forEach(item => {
    historyHTML += `<div>${item}</div>`;
  });
  historyHTML += "</div>";

  document.getElementById("result").innerHTML = `
    <b>📦 ${code}</b><br><br>
    🚚 Shipment in transit
    ${historyHTML}
  `;
}

</script>

</body>
</html>

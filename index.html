<!DOCTYPE html>
<html>
<head>
  <title>BlueWave Logistics</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#000;
      color:white;
    }

    header {
      background:#ffcc00;
      padding:15px;
      text-align:center;
      font-weight:bold;
      font-size:20px;
      color:black;
    }

    .hero {
      background:url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
      background-size:cover;
      padding:100px 20px;
      text-align:center;
    }

    .hero h1 {
      font-size:32px;
    }

    .search-box {
      margin-top:20px;
      display:flex;
      max-width:400px;
      margin-left:auto;
      margin-right:auto;
    }

    .search-box input {
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px 0 0 10px;
    }

    .search-box button {
      padding:12px;
      border:none;
      background:#ffcc00;
      font-weight:bold;
      border-radius:0 10px 10px 0;
    }

    .cards {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:20px;
    }

    .card {
      background:#111;
      padding:20px;
      border-radius:15px;
      text-align:center;
    }

    #result {
      padding:20px;
    }

  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
</header>

<div class="hero">
  <h1>Live Shipment Tracking</h1>

  <div class="search-box">
    <input id="code" placeholder="Enter tracking number">
    <button onclick="track()">Track</button>
  </div>
</div>

<div class="cards">
  <div class="card">🚚 Fast Delivery</div>
  <div class="card">✈️ International Shipping</div>
  <div class="card">📦 Secure Packaging</div>
  <div class="card">📍 Real-Time Tracking</div>
</div>

<div id="result"></div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

// TRACK FUNCTION
window.track = async function(){
  const code = document.getElementById("code").value;

  const ref = doc(db, "shipments", code);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const d = snap.data();

    document.getElementById("result").innerHTML = `
      <div style="background:#111;padding:20px;border-radius:10px;">
        <b>${code}</b><br><br>
        📍 ${d.location}<br>
        👤 ${d.receiver}<br>
        📦 ${d.weight}<br>
        📅 ${d.deliveryDate}<br>
        🚚 ${d.status}
      </div>
    `;
  } else {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>❌ Tracking not found</p>";
  }
}

</script>

</body>
</html>

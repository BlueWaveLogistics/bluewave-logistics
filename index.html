<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: #111;
      min-height: 100vh;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .timeline {
      margin-top: 10px;
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
    }

    .timeline-item {
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

<div class="app">

<header>
  BlueWave Logistics 🚚
  <button onclick="unlockAdmin()" style="float:right;">Admin</button>
</header>

<div class="container">

  <!-- TRACK -->
  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <button onclick="showAllShipments()">📦 Dashboard</button>

  <div id="result" class="card"></div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;" class="card">

    <h3>Add Shipment</h3>

    <input id="newLocation" placeholder="Location">
    <input id="newReceiver" placeholder="Receiver">
    <input id="newStatus" placeholder="Status">

    <button onclick="addShipment()">Add Shipment</button>

  </div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "bluewave-logistics-c9a21.firebaseapp.com",
  projectId: "bluewave-logistics-c9a21"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🚀 TRACK
window.track = async function () {
  const code = document.getElementById("code").value.trim();

  const ref = doc(db, "shipments", code);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Tracking not found</p>";
    return;
  }

  const data = snap.data();

  let historyHTML = "";
  if (data.history) {
    data.history.forEach(h => {
      historyHTML += `<div class="timeline-item">${h}</div>`;
    });
  }

  document.getElementById("result").innerHTML = `
    <b>📦 ${code}</b><br><br>
    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.status}<br>
    <div class="timeline">${historyHTML}</div>
  `;
};

// ➕ ADD SHIPMENT
window.addShipment = async function () {
  const code = "BW" + Math.floor(Math.random() * 10000);

  await setDoc(doc(db, "shipments", code), {
    location: document.getElementById("newLocation").value,
    receiver: document.getElementById("newReceiver").value,
    status: document.getElementById("newStatus").value,
    history: ["Shipment created"]
  });

  alert("Created: " + code);
};

// 📦 DASHBOARD
window.showAllShipments = async function () {
  const querySnapshot = await getDocs(collection(db, "shipments"));

  let output = "<h3>All Shipments</h3>";

  querySnapshot.forEach(docSnap => {
    const s = docSnap.data();

    output += `
      <div class="card">
        <b>${docSnap.id}</b><br>
        📍 ${s.location}<br>
        📦 ${s.status}
      </div>
    `;
  });

  document.getElementById("result").innerHTML = output;
};

// 🔐 ADMIN LOGIN
window.unlockAdmin = function () {
  const pass = prompt("Admin password");

  if (pass === "admin123") {
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong password");
  }
};

</script>

</body>
</html>

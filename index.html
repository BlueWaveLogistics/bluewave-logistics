<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#ffcc00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  color:black;
  font-weight:bold;
}

.hero{
  background:url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  padding:100px 20px;
  text-align:center;
  background-size:cover;
}

.track-box{
  display:flex;
  max-width:400px;
  margin:auto;
  margin-top:20px;
}

.track-box input{
  flex:1;
  padding:15px;
  border:none;
  border-radius:10px 0 0 10px;
}

.track-box button{
  padding:15px;
  background:#ffcc00;
  border:none;
  border-radius:0 10px 10px 0;
}

.card{
  margin:20px;
  padding:25px;
  background:linear-gradient(145deg,#111,#1a1a1a);
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

input{
  padding:12px;
  width:90%;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<button onclick="showLogin()">Login</button>
</header>

<div class="hero">
<h1>Track Shipment</h1>

<div class="track-box">
<input id="code" placeholder="Tracking code">
<button onclick="track()">Track</button>
</div>
</div>

<div id="result"></div>

<!-- LOGIN -->
<div id="login" style="display:none; padding:20px;">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.appspot.com",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SHOW LOGIN
window.showLogin = ()=>{
  document.getElementById("login").style.display="block";
};

// LOGIN
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login successful");
  }catch(e){
    alert(e.message);
  }
};

// TRACK FUNCTION (FINAL UI)
window.track = async ()=>{

  const codeVal = document.getElementById("code").value.trim();
  const snap = await getDoc(doc(db,"shipments",codeVal));

  if(!snap.exists()){
    result.innerHTML = "<p style='color:red'>Tracking not found</p>";
    return;
  }

  const d = snap.data();

  const location = d.location || "Unknown";
  const receiver = d.receiver || "Unknown";
  const weight = d.weight || "N/A";
  const date = d.deliveryDate || "Not available";
  const status = d.status || "Pending";

  const progress =
    status==="Pending"?25:
    status==="In Transit"?50:
    status==="Out for Delivery"?75:100;

  result.innerHTML = `
  <div class="card">

    <h2>${codeVal}</h2>

    📍 ${location}<br>
    👤 ${receiver}<br>
    📦 ${weight}<br>
    📅 ${date}<br>
    🚚 <b>${status}</b>

    <div style="margin-top:20px;background:#333;border-radius:20px;">
      <div style="
        width:${progress}%;
        height:10px;
        background:#ffcc00;
        border-radius:20px;
      "></div>
    </div>

    <div style="
      margin-top:20px;
      font-size:14px;
      color:#aaa;
      border-left:2px solid #ffcc00;
      padding-left:10px;
    ">
      ${progress >= 25 ? "✔ Shipment created<br>" : ""}
      ${progress >= 50 ? "✔ In transit<br>" : ""}
      ${progress >= 75 ? "✔ Out for delivery<br>" : ""}
      ${progress === 100 ? "✔ Delivered<br>" : ""}
    </div>

  </div>
  `;
};

</script>

</body>
</html>

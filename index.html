<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    input {
      padding: 14px;
      width: 80%;
      max-width: 320px;
      border-radius: 10px;
      border: none;
      margin: 10px;
      background: #1f1f1f;
      color: white;
    }

    button {
      padding: 12px 25px;
      background: #ffcc00;
      color: black;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin: 20px auto;
      padding: 20px;
      max-width: 360px;
      background: #141414;
      border-radius: 15px;
      border-left: 4px solid #ffcc00;
      text-align: left;
      box-shadow: 0 0 25px rgba(255,204,0,0.2);
    }

    .status {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #222;
      border-radius: 20px;
    }

    #progressBar {
      height: 12px;
      width: 0%;
      background: linear-gradient(90deg, #ffcc00, gold);
      border-radius: 20px;
      transition: 1s;
    }

    .timeline {
      margin-top: 15px;
      border-left: 2px solid #ffcc00;
      padding-left: 15px;
    }

    .timeline-item {
      margin-bottom: 10px;
    }

    /* WhatsApp */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
<img src="https://i.imgur.com/6X4QK0B.png" style="height:45px; border-radius:8px;">
    <div style="line-height:1;">
      <div style="font-weight:bold;">BlueWave</div>
      <small style="font-size:12px;">Logistics</small>
    </div>
  </div>

  <button>Admin</button>
</header>
<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<script>

let shipments = {

  "BW1001": {
    status: "In Transit",
    location: "New York, USA",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: [
      "Shipment created - Italy",
      "Picked up by BlueWave",
      "In transit to USA"
    ]
  },

  "BW1002": {
    status: "Delivered",
    location: "London, UK",
    sender: "BlueWave",
    receiver: "Emma Watson",
    weight: "3kg",
    deliveryDate: "20 March 2026",
    history: [
      "Shipment created - Italy",
      "In transit",
      "Delivered"
    ]
  },

  "BW1003": {
    status: "Out for Delivery",
    location: "Toronto, Canada",
    sender: "BlueWave",
    receiver: "Michael Lee",
    weight: "2kg",
    deliveryDate: "26 March 2026",
    history: [
      "Shipment created - Italy",
      "Arrived in Canada",
      "Out for delivery"
    ]
  },

  "BW1004": {
    status: "Pending",
    location: "Dubai, UAE",
    sender: "BlueWave",
    receiver: "Ali Hassan",
    weight: "6kg",
    deliveryDate: "30 March 2026",
    history: [
      "Shipment created - Italy"
    ]
  },

  "BW1005": {
    status: "In Transit",
    location: "Berlin, Germany",
    sender: "BlueWave",
    receiver: "Sophia Klein",
    weight: "4kg",
    deliveryDate: "28 March 2026",
    history: [
      "Shipment created - Italy",
      "Departed facility",
      "In transit"
    ]
  }

};

function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Tracking code not found</p>";
    return;
  }

  let color =
    data.status === "Delivered" ? "green" :
    data.status === "In Transit" ? "orange" :
    data.status === "Out for Delivery" ? "gold" : "gray";

  let statusHTML = `
    <div class="status" style="background:${color};">
      ${data.status}
    </div>
  `;

  let historyHTML = "";
  data.history.forEach(item => {
    historyHTML += `<div class="timeline-item">${item}</div>`;
  });

  historyHTML = `<div class="timeline">${historyHTML}</div>`;

  let progress = 0;
  if (data.status === "Pending") progress = 25;
  else if (data.status === "In Transit") progress = 50;
  else if (data.status === "Out for Delivery") progress = 75;
  else if (data.status === "Delivered") progress = 100;

  const bar = document.getElementById("progressBar");
  bar.style.width = "0%";

  setTimeout(() => {
    bar.style.width = progress + "%";
  }, 200);

  document.getElementById("progressText").innerText =
    "Progress: " + progress + "%";

  document.getElementById("result").innerHTML =
    statusHTML + `
    <b>📦 Tracking ID:</b> ${code}<br><br>
    📍 ${data.location}<br>
    📦 ${data.sender}<br>
    👤 ${data.receiver}<br>
    ⚖️ ${data.weight}<br>
    📅 ${data.deliveryDate}<br>
    ` + historyHTML;
}

</script>

<!-- CONTACT -->
<div style="margin-top:50px; padding:25px; background:#0a0a0a;">
  <h3>Customer Support</h3>
  <p style="color:#aaa;">For tracking issues or delivery inquiries</p>
  <p>
    📧 <a href="mailto:support@shippingcompanyservice015@gmail.com" style="color:#ffcc00;">
      support@shippingcompanyservice015@gmail.com
    </a>
  </p>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/234XXXXXXXXXX" target="_blank">💬</a>

</body>
</html>

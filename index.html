<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
    }

    header {
      background: linear-gradient(90deg, #000, #111, #000);
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(255,165,0,0.3);
    }

    input {
      padding: 12px;
      width: 70%;
      max-width: 260px;
      border-radius: 8px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      background: orange;
      color: white;
      border: none;
      margin: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .card {
      margin: 20px auto;
      padding: 20px;
      max-width: 350px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    }

    .status {
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .pending { background: gray; }
    .transit { background: orange; }
    .out { background: gold; color: black; }
    .delivered { background: green; }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #222;
      border-radius: 20px;
    }

    #progressBar {
      height: 12px;
      width: 0%;
      background: linear-gradient(90deg, orange, gold);
      border-radius: 20px;
      transition: 0.5s;
    }

    /* TIMELINE */
    .timeline {
      text-align: left;
      margin-top: 20px;
      position: relative;
      padding-left: 20px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 8px;
      width: 2px;
      height: 100%;
      background: orange;
    }

    .timeline-item {
      margin-bottom: 15px;
      position: relative;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -14px;
      width: 10px;
      height: 10px;
      background: orange;
      border-radius: 50%;
    }

    #adminPanel {
      display: none;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
  <button onclick="unlockAdmin()">Admin</button>
</header>

<h2>Track Shipment</h2>

<input id="code" placeholder="Enter tracking code">
<button onclick="track()">Track</button>

<div id="result" class="card"></div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<p id="progressText"></p>

<!-- ADMIN -->
<div id="adminPanel" class="card">
  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>

  <input id="newStatus" placeholder="Status">

  <div>
    <button onclick="setStatus('Pending')">Pending</button>
    <button onclick="setStatus('In Transit')">Transit</button>
    <button onclick="setStatus('Out for Delivery')">Out</button>
    <button onclick="setStatus('Delivered')">Delivered</button>
  </div>

  <button onclick="addShipment()">Add Shipment</button>
</div>

<script>

// STORAGE
let shipments = {
  "BW1001": {
    status: "In Transit",
    location: "New York, USA",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: [
      "Shipment created - Lagos",
      "Picked up by BlueWave",
      "In transit to USA"
    ]
  }
};

// STATUS BUTTON
function setStatus(status) {
  document.getElementById("newStatus").value = status;
}

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (data) {

    // ✅ STATUS BADGE
    let statusHTML = `
    <div style="
      background:${data.status === 'Delivered' ? 'green' :
                   data.status === 'In Transit' ? 'orange' :
                   data.status === 'Out for Delivery' ? 'gold' : 'gray'};
      color:${data.status === 'Out for Delivery' ? 'black' : 'white'};
      padding:8px 16px;
      border-radius:20px;
      display:inline-block;
      font-weight:bold;
      margin-bottom:10px;
    ">
      ${data.status}
    </div>`;

    // ✅ TIMELINE
    let historyHTML = "";
    data.history.forEach(item => {
      historyHTML += `<div class="timeline-item">${item}</div>`;
    });

    historyHTML = `<div class="timeline">${historyHTML}</div>`;

    // ✅ PROGRESS
    let progress = 0;
    if (data.status === "Pending") progress = 25;
    else if (data.status === "In Transit") progress = 50;
    else if (data.status === "Out for Delivery") progress = 75;
    else if (data.status === "Delivered") progress = 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").innerText =
      "Progress: " + progress + "%";

    // ✅ RESULT OUTPUT
    document.getElementById("result").innerHTML =
      statusHTML + `
      <br>
      <b>Location:</b> ${data.location}<br>
      <b>Sender:</b> ${data.sender}<br>
      <b>Receiver:</b> ${data.receiver}<br>
      <b>Weight:</b> ${data.weight}<br>
      <b>Delivery Date:</b> ${data.deliveryDate}<br><br>
      ` + historyHTML;

  } else {
    document.getElementById("result").innerText = "Tracking code not found";
  }
}

// ADD SHIPMENT
function addShipment() {
  counter++;
  const code = "BW" + counter;

  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  let history = [];
  history.push(status + " - " + location);

  shipments[code] = {
    status,
    location,
    sender: document.getElementById("newSender").value,
    receiver: document.getElementById("newReceiver").value,
    weight: document.getElementById("newWeight").value,
    deliveryDate: document.getElementById("newDate").value,
    history
  };

  saveData();

  alert("Shipment created: " + code);
}

</script>

</body>
</html>

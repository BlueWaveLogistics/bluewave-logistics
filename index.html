<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-weight: bold;
      font-size: 20px;
    }

    input {
      padding: 12px;
      margin: 10px;
      width: 80%;
      max-width: 300px;
      border: none;
      border-radius: 8px;
    }

    button {
      padding: 12px 20px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #loginBox, #dashboard {
      margin-top: 40px;
    }

    #dashboard {
      display: none;
    }

    #result {
      margin: 20px auto;
      padding: 20px;
      max-width: 350px;
      background: #1a1a1a;
      border-radius: 12px;
      text-align: left;
      border-left: 5px solid #ffcc00;
    }

    .timeline {
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
      margin-top: 10px;
    }

    .timeline-item {
      margin-bottom: 8px;
    }

    #progressContainer {
      width: 80%;
      max-width: 350px;
      margin: 20px auto;
      background: #333;
      border-radius: 20px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 20px;
      transition: 0.5s;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Track Shipment</h2>

  <input id="code" placeholder="Enter tracking code"><br>
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <p id="progressText"></p>
</div>

<script>

// SIMPLE LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email && password) {
    localStorage.setItem("user", email);
    showDashboard();
  } else {
    alert("Enter login details");
  }
}

function showDashboard() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

// AUTO LOGIN
if (localStorage.getItem("user")) {
  showDashboard();
}

// SHIPMENTS DATA
let shipments = {
  "BW1001": {
    status: "In Transit",
    location: "New York, USA",
    history: ["Created - Italy", "Picked up", "In transit"]
  },
  "BW1002": {
    status: "Delivered",
    location: "London, UK",
    history: ["Created", "Transit", "Delivered"]
  },
  "BW1003": {
    status: "Out for Delivery",
    location: "Berlin, Germany",
    history: ["Created", "Transit", "Out for delivery"]
  }
};

// TRACK FUNCTION
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Tracking code not found</p>";
    return;
  }

  // STATUS COLOR
  let color =
    data.status === "Delivered" ? "green" :
    data.status === "In Transit" ? "orange" :
    data.status === "Out for Delivery" ? "gold" : "gray";

  let statusHTML = `
    <div style="
      background:${color};
      padding:8px 16px;
      border-radius:20px;
      display:inline-block;
      font-weight:bold;
      margin-bottom:10px;
      color:${color === 'gold' ? 'black' : 'white'};
    ">
      ${data.status}
    </div>
  `;

  // TIMELINE
  let historyHTML = "";
  data.history.forEach(item => {
    historyHTML += `<div class="timeline-item">${item}</div>`;
  });

  historyHTML = `<div class="timeline">${historyHTML}</div>`;

  // PROGRESS
  let progress = 0;
  if (data.status === "Pending") progress = 25;
  else if (data.status === "In Transit") progress = 50;
  else if (data.status === "Out for Delivery") progress = 75;
  else if (data.status === "Delivered") progress = 100;

  const bar = document.getElementById("progressBar");
  bar.style.width = "0%";

  setTimeout(() => {
    bar.style.width = progress + "%";
  }, 200);

  document.getElementById("progressText").innerText =
    "Progress: " + progress + "%";

  // RESULT
  document.getElementById("result").innerHTML =
    statusHTML + `
    <br>
    <b>📍 Location:</b> ${data.location}<br><br>
    ` + historyHTML;
}

</script>

</body>
</html>

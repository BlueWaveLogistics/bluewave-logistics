<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#ffcc00;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:black;
  font-weight:bold;
}

header div button{
  margin-left:10px;
}

.page{display:none;}
.active{display:block;}

.hero{
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  background-size:cover;
  padding:120px 20px;
  text-align:center;
}

.track-box{
  display:flex;
  max-width:400px;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.track-box input{
  flex:1;
  padding:15px;
  border:none;
}

.track-box button{
  background:#ffcc00;
  border:none;
  padding:15px;
  font-weight:bold;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

input, select{
  width:90%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<div>
<button onclick="show('home')">Home</button>
<button onclick="show('policy')">Policy</button>
<button onclick="show('login')">Login</button>
</div>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Live Shipment Tracking</h1>

<div class="track-box">
<input id="code" placeholder="Enter tracking number">
<button onclick="track()">Track</button>
</div>
</div>

<div class="features">
<div class="card">🚚 Fast Delivery</div>
<div class="card">✈️ International Shipping</div>
<div class="card">📦 Secure Packaging</div>
<div class="card">📍 Real-Time Tracking</div>
</div>

<div id="result"></div>
</div>

<!-- POLICY -->
<div id="policy" class="page">
<h2 style="padding:20px;">Shipping Policy 📜</h2>
<div class="card" style="margin:20px;">
<p>We provide secure and reliable delivery services worldwide.</p>
</div>
<button onclick="show('home')">Back</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2 style="padding:20px;">Login / Signup</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 style="padding:20px;">Admin Dashboard 🔐</h2>
<button onclick="show('admin')">Add Shipment</button>
<button onclick="logout()">Logout</button>
<div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="padding:20px;">Add Shipment</h2>

<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">

<select id="status">
<option>Order Received</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="addShipment()">Add Shipment</button>
<button onclick="show('dashboard')">Back</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isAdmin = false;

// NAVIGATION
window.show = (id)=>{
  if((id==="dashboard" || id==="admin") && !isAdmin){
    alert("Admin only 🔐");
    return;
  }

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// SIGNUP
window.signup = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Account created");
  }catch(e){alert(e.message);}
};

// LOGIN
window.login = async ()=>{
  try{
    const emailVal = document.getElementById("email").value;
    const passVal = document.getElementById("password").value;

    const user = await signInWithEmailAndPassword(auth, emailVal, passVal);

    isAdmin = (user.user.email === "shippingcompanyservice015@gmail.com");

    if(isAdmin){
      alert("👑 Admin login");
      show("dashboard");
      loadShipments();
    } else {
      alert("✅ Login successful");
      show("home");
    }

  }catch(e){
    alert("❌ " + e.message);
  }
};

window.logout = ()=>{
  isAdmin = false;
  show("home");
};
// ADD SHIPMENT
window.addShipment = async ()=>{
  try{

    const locationInput = document.getElementById("location");
    const receiverInput = document.getElementById("receiver");
    const weightInput = document.getElementById("weight");
    const statusInput = document.getElementById("status");

    const locationVal = locationInput.value.trim();
    const receiverVal = receiverInput.value.trim();
    const weightVal = weightInput.value.trim();
    const statusVal = statusInput.value;

    if(!locationVal || !receiverVal || !weightVal){
      alert("Fill all fields");
      return;
    }

    const code = "BW"+Math.floor(1000+Math.random()*9000);

    await setDoc(doc(db,"shipments",code),{
  location: locationVal,
  receiver: receiverVal,
  weight: weightVal,
  status: statusVal,
  paid: false
});

    alert("✅ Shipment Created: " + code);

    // clear inputs
    locationInput.value = "";
receiverInput.value = "";
weightInput.value = "";
statusInput.value = "";

    show("dashboard");
    loadShipments();

  }catch(e){
    alert("❌ ERROR: " + e.message);
    console.error(e);
  }
};

// LOAD DASHBOARD
async function loadShipments(){
  shipments.innerHTML="";
  const snap = await getDocs(collection(db,"shipments"));

  snap.forEach(docu=>{
    const d = docu.data();
    shipments.innerHTML += `
    <div class="card">
    <b>${docu.id}</b><br>
    ${d.location}<br>
    ${d.status}
    </div>`;
  });
}

// TRACK
window.track = async ()=>{

  const codeVal = document.getElementById("code").value.trim();

  const snap = await getDoc(doc(db,"shipments",codeVal));

  if(!snap.exists()){
    document.getElementById("result").innerHTML = "Not found";
    return;
  }

  const d = snap.data();

  document.getElementById("result").innerHTML = `
<div class="card">
<h2>📦 ${codeVal}</h2>

<p><b>📍 Location:</b> ${d.location}</p>
<p><b>👤 Receiver:</b> ${d.receiver}</p>
<p><b>📦 Weight:</b> ${d.weight}</p>

<hr>

<h3>🚚 Shipment Progress</h3>

<div style="text-align:left">

<p>${d.status === "Order Received" ? "🟡" : "🟢"} Order Received</p>
<p>${["Picked Up","In Transit","Arrived at Facility","Out for Delivery","Delivered"].includes(d.status) ? "🟢" : "⚪"} Picked Up</p>
<p>${["In Transit","Arrived at Facility","Out for Delivery","Delivered"].includes(d.status) ? "🟢" : "⚪"} In Transit</p>
<p>${["Arrived at Facility","Out for Delivery","Delivered"].includes(d.status) ? "🟢" : "⚪"} Arrived at Facility</p>
<p>${["Out for Delivery","Delivered"].includes(d.status) ? "🟢" : "⚪"} Out for Delivery</p>
<p>${d.status === "Delivered" ? "🟢" : "⚪"} Delivered</p>

</div>

<hr>

<p>
<b>💳 Payment:</b> 
${d.paid ? "✅ Paid" : `
❌ Not Paid
<br><br>
<button onclick="markPaid('${codeVal}')">Mark as Paid</button>
`}
</p>

</div>`;
};
window.markPaid = async (code)=>{
  try{
    await updateDoc(doc(db,"shipments",code),{
      paid: true
    });

    alert("Payment marked as paid ✅");
    track();

  }catch(e){
    alert("❌ " + e.message);
  }
};
</script>

</body>
</html>

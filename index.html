<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    /* APP CONTAINER */
    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      font-weight: bold;
      text-align: center;
      font-size: 20px;
    }

    .screen {
      flex: 1;
      padding: 20px;
      display: none;
    }

    .active {
      display: block;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      display: inline-block;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .pending { background: gray; }
    .transit { background: orange; }
    .out { background: gold; color: black; }
    .delivered { background: green; }

    #progressBar {
      height: 8px;
      width: 0%;
      background: #ffcc00;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* BOTTOM NAV */
    .nav {
      display: flex;
      background: #111;
      border-top: 1px solid #333;
    }

    .nav button {
      flex: 1;
      background: none;
      color: white;
      padding: 12px;
    }

    .nav button.activeTab {
      color: #ffcc00;
    }
  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<!-- TRACK SCREEN -->
<div id="trackScreen" class="screen active">

  <h3>Track Shipment</h3>

  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <div id="result" class="card"></div>

  <div id="progressBar"></div>

</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen" class="screen">

  <h3>Admin Panel</h3>

  <input id="newLocation" placeholder="Location">
  <input id="newStatus" placeholder="Status">

  <button onclick="setStatus('Pending')">Pending</button>
  <button onclick="setStatus('In Transit')">Transit</button>
  <button onclick="setStatus('Delivered')">Delivered</button>

  <button onclick="addShipment()">Add Shipment</button>

  <div id="shipmentList"></div>

</div>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="switchTab('track')" class="activeTab">Track</button>
  <button onclick="switchTab('admin')">Admin</button>
</div>

</div>

<script>

// DATABASE
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status: "In Transit",
    location: "New York",
    history: ["Shipment created", "In transit"]
  }
};

function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// NAVIGATION
function switchTab(tab) {
  document.getElementById("trackScreen").classList.remove("active");
  document.getElementById("adminScreen").classList.remove("active");

  document.querySelectorAll(".nav button").forEach(btn => btn.classList.remove("activeTab"));

  if (tab === "track") {
    trackScreen.classList.add("active");
    document.querySelectorAll(".nav button")[0].classList.add("activeTab");
  } else {
    adminScreen.classList.add("active");
    document.querySelectorAll(".nav button")[1].classList.add("activeTab");
    loadShipments();
  }
}

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    result.innerHTML = "Not found";
    return;
  }

  let cls =
    data.status === "Delivered" ? "delivered" :
    data.status === "In Transit" ? "transit" :
    data.status === "Out for Delivery" ? "out" : "pending";

  let historyHTML = "";
  data.history.forEach(h => {
    historyHTML += `<div>• ${h}</div>`;
  });

  result.innerHTML =
    `<div class="status ${cls}">${data.status}</div>
     <br>📍 ${data.location}
     <br><br>${historyHTML}`;

  let progress =
    data.status === "Delivered" ? 100 :
    data.status === "In Transit" ? 50 : 25;

  document.getElementById("progressBar").style.width = progress + "%";
}

// ADD
function addShipment() {
  const code = "BW" + Math.floor(Math.random() * 9000);

  shipments[code] = {
    status: document.getElementById("newStatus").value,
    location: document.getElementById("newLocation").value,
    history: ["Shipment created"]
  };

  saveData();
  alert("Created: " + code);
  loadShipments();
}

// LOAD
function loadShipments() {
  let html = "";

  for (let code in shipments) {
    html += `<div class="card">${code} - ${shipments[code].status}</div>`;
  }

  shipmentList.innerHTML = html;
}

// STATUS
function setStatus(status) {
  document.getElementById("newStatus").value = status;
}

</script>

</body>
</html>

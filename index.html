<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #111;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .timeline {
      margin-top: 15px;
      border-left: 2px solid #ffcc00;
      padding-left: 10px;
    }

    .timeline-item {
      margin-bottom: 8px;
    }

    #progressContainer {
      margin-top: 15px;
      background: #333;
      border-radius: 10px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      background: #ffcc00;
      border-radius: 10px;
      transition: 0.5s;
    }
  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<div class="container">

  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <button onclick="showAllShipments()">📦 Admin Dashboard</button>

  <div id="result" class="card"></div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <p id="progressText"></p>

  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location">
  <input id="newStatus" placeholder="Status">

  <button onclick="setStatus('Pending')">Pending</button>
  <button onclick="setStatus('In Transit')">Transit</button>
  <button onclick="setStatus('Out for Delivery')">Out</button>
  <button onclick="setStatus('Delivered')">Delivered</button>

  <button onclick="addShipment()">Add Shipment</button>

</div>

</div>

<!-- 💬 CHAT BUTTON -->
<div style="
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
">
💬
</div>

<script>

// 💾 STORAGE
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status: "In Transit",
    location: "New York",
    sender: "BlueWave",
    receiver: "John Doe",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: ["Shipment created - Italy", "In transit"]
  }
};

let counter = Object.keys(shipments).length + 1000;

function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// 🚀 TRACK SYSTEM
function track() {
  const code = document.getElementById("code").value.trim().toUpperCase();
  let data = shipments[code];

  // AUTO GENERATE
  if (!data) {
    const locations = ["New York", "London", "Berlin", "Paris", "Madrid", "Rome"];
    const names = ["John Doe", "Maria Lopez", "Ali Khan", "Sophia Klein"];

    const statusList = ["Pending", "In Transit", "Out for Delivery", "Delivered"];
    const status = statusList[Math.floor(Math.random() * statusList.length)];

    data = {
      status,
      location: locations[Math.floor(Math.random() * locations.length)],
      sender: "BlueWave",
      receiver: names[Math.floor(Math.random() * names.length)],
      weight: Math.floor(Math.random() * 10 + 1) + "kg",
      deliveryDate: "Arriving soon",
      history: ["Shipment created - Italy", status]
    };
  }

  let extraMsg = "";
  if (data.status === "Out for Delivery") {
    extraMsg = "<br><b>🚚 Arriving Today</b>";
  }

  let historyHTML = "";
  data.history.forEach(h => {
    historyHTML += `<div class="timeline-item">${h}</div>`;
  });

  let progress = 25;
  if (data.status === "In Transit") progress = 50;
  if (data.status === "Out for Delivery") progress = 75;
  if (data.status === "Delivered") progress = 100;

  document.getElementById("progressBar").style.width = progress + "%";
  document.getElementById("progressText").innerText = "Progress: " + progress + "%";

  document.getElementById("result").innerHTML = `
    <b>📦 ${code}</b><br><br>
    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    ⚖️ ${data.weight}<br>
    📅 ${data.deliveryDate}
    ${extraMsg}
    <div class="timeline">${historyHTML}</div>
  `;
}

// ➕ ADD SHIPMENT
function addShipment() {
  counter++;
  const code = "BW" + counter;

  shipments[code] = {
    status: document.getElementById("newStatus").value,
    location: document.getElementById("newLocation").value,
    sender: "BlueWave",
    receiver: "Customer",
    weight: "3kg",
    deliveryDate: "Processing",
    history: ["Created"]
  };

  saveData();
  alert("Created: " + code);
}

// 📦 ADMIN DASHBOARD
function showAllShipments() {
  let output = "<h3>All Shipments</h3>";

  for (let code in shipments) {
    let s = shipments[code];

    output += `
      <div class="card">
        <b>${code}</b><br>
        📍 ${s.location}<br>
        📦 ${s.status}<br><br>

        <button onclick="deleteShipment('${code}')">Delete</button>
        <button onclick="updateStatus('${code}')">Mark Delivered</button>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = output;
}

// ❌ DELETE
function deleteShipment(code) {
  delete shipments[code];
  saveData();
  showAllShipments();
}

// ⚡ UPDATE
function updateStatus(code) {
  shipments[code].status = "Delivered";
  shipments[code].history.push("Delivered");
  saveData();
  showAllShipments();
}

// STATUS BUTTON
function setStatus(status) {
  document.getElementById("newStatus").value = status;
}

</script>

</body>
</html>

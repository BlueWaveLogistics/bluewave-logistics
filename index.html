<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #111;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 10px;
    }

    .pending { background: gray; }
    .transit { background: orange; }
    .delivered { background: green; }

    #progressBar {
      height: 8px;
      width: 0%;
      background: #ffcc00;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<div class="container">

  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <button onclick="showAllData()">📦 View All Shipments</button>
  <button onclick="exportData()">⬇ Download Data</button>

  <div id="result" class="card"></div>

  <div id="progressBar"></div>

  <h3>Add Shipment</h3>

  <input id="newLocation" placeholder="Location">
  <input id="newStatus" placeholder="Status">

  <button onclick="setStatus('Pending')">Pending</button>
  <button onclick="setStatus('In Transit')">Transit</button>
  <button onclick="setStatus('Delivered')">Delivered</button>

  <button onclick="addShipment()">Add Shipment</button>

</div>

</div>

<script>

// 💾 DATABASE
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status: "In Transit",
    location: "New York",
    history: ["Shipment created - Italy", "In transit"]
  },
  "BW1002": {
    status: "Delivered",
    location: "London",
    history: ["Shipment created - Italy", "Delivered"]
  }
};

let counter = Object.keys(shipments).length + 1000;

function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    result.innerHTML = "❌ Not found";
    return;
  }

  let cls =
    data.status === "Delivered" ? "delivered" :
    data.status === "In Transit" ? "transit" : "pending";

  let historyHTML = "";
  data.history.forEach(h => {
    historyHTML += `<div>• ${h}</div>`;
  });

  result.innerHTML =
    `<div class="status ${cls}">${data.status}</div>
     <br>📍 ${data.location}
     <br><br>${historyHTML}`;

  let progress =
    data.status === "Delivered" ? 100 :
    data.status === "In Transit" ? 50 : 25;

  document.getElementById("progressBar").style.width = progress + "%";
}

// SHOW ALL DATA
function showAllData() {
  let output = "";

  for (let code in shipments) {
    let s = shipments[code];

    output += `
      <div class="card">
        <b>${code}</b><br>
        📍 ${s.location}<br>
        📦 ${s.status}
      </div>
    `;
  }

  result.innerHTML = output;
}

// ADD SHIPMENT
function addShipment() {
  counter++;
  const code = "BW" + counter;

  const status = document.getElementById("newStatus").value;
  const location = document.getElementById("newLocation").value;

  shipments[code] = {
    status,
    location,
    history: [status + " - " + location]
  };

  saveData();

  alert("Created: " + code);
}

// SET STATUS
function setStatus(status) {
  document.getElementById("newStatus").value = status;
}

// EXPORT DATA
function exportData() {
  const dataStr = JSON.stringify(shipments, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "shipments.json";
  a.click();
}

</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LEAFLET MAP -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    header {
      background:#ffcc00;
      color:black;
      padding:15px;
      font-weight:bold;
    }

    input {
      padding:12px;
      margin:10px;
      width:80%;
      max-width:300px;
      border:none;
      border-radius:8px;
    }

    button {
      padding:12px 20px;
      background:#ffcc00;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .hidden { display:none; }

    #result {
      margin:20px auto;
      padding:20px;
      max-width:350px;
      background:#1a1a1a;
      border-left:5px solid #ffcc00;
      border-radius:12px;
      text-align:left;
    }

    #map {
      width:90%;
      height:300px;
      margin:20px auto;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>BlueWave Logistics 🚚</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <br>
  <button onclick="showSignup()">Create Account</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="hidden">
  <h2>Sign Up</h2>
  <input id="signupEmail" placeholder="Email"><br>
  <input id="signupPass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Create</button>
  <br>
  <button onclick="showLogin()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h2>Track Shipment</h2>
  <input id="code" placeholder="Tracking code"><br>
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <!-- MAP -->
  <div id="map"></div>

  <h3>Add Shipment (Admin)</h3>

  <input id="newLocation" placeholder="Location"><br>
  <input id="newSender" placeholder="Sender"><br>
  <input id="newReceiver" placeholder="Receiver"><br>
  <input id="newWeight" placeholder="Weight"><br>
  <input id="newDate" placeholder="Delivery Date"><br>
  <input id="newStatus" placeholder="Status"><br>

  <button onclick="addShipment()">Add Shipment</button>

  <br><br>
  <button onclick="logout()" style="background:red;color:white;">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔑 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.firebasestorage.app",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754",
  measurementId: "G-BT4DYMNWBL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// UI SWITCH
window.showSignup = () => {
  loginBox.style.display="none";
  signupBox.style.display="block";
};

window.showLogin = () => {
  signupBox.style.display="none";
  loginBox.style.display="block";
};

window.showDashboard = () => {
  loginBox.style.display="none";
  signupBox.style.display="none";
  dashboard.style.display="block";
};

// AUTH
window.signup = async () => {
  await createUserWithEmailAndPassword(auth, signupEmail.value, signupPass.value);
  alert("Account created");
  showLogin();
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, loginEmail.value, loginPass.value);
  showDashboard();
};

window.logout = () => {
  signOut(auth);
  location.reload();
};

// ADD SHIPMENT
window.addShipment = async () => {
  const code = "BW" + Math.floor(Math.random()*10000);

  await setDoc(doc(db, "shipments", code), {
    location: newLocation.value,
    sender: newSender.value,
    receiver: newReceiver.value,
    weight: newWeight.value,
    deliveryDate: newDate.value,
    status: newStatus.value,
    lat: 40.7128,
    lng: -74.0060
  });

  alert("Shipment created: " + code);
};

// MAP
let map = L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

// TRACK
window.track = async () => {

  const code = document.getElementById("code").value;
  const docSnap = await getDoc(doc(db,"shipments",code));

  if(!docSnap.exists()){
    result.innerHTML="❌ Not found";
    return;
  }

  const data = docSnap.data();

  result.innerHTML = `
    <b>${code}</b><br>
    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.weight}<br>
    📅 ${data.deliveryDate}<br>
    🚚 ${data.status}
  `;

  if(marker) map.removeLayer(marker);

  marker = L.marker([data.lat, data.lng]).addTo(map);
  map.setView([data.lat, data.lng], 6);
};

</script>

</body>
</html>

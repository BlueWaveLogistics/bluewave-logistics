<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #111;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h3>Account</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>

    <p id="userInfo">Not logged in</p>

    <button onclick="myShipments()">📦 My Shipments</button>
  </div>

  <!-- TRACK -->
  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <div id="result" class="card"></div>

  <!-- ADMIN -->
  <div class="card">
    <h3>Add Shipment (Admin)</h3>

    <input id="newLocation" placeholder="Location">
    <input id="newReceiver" placeholder="Receiver">
    <input id="newStatus" placeholder="Status">

    <button onclick="addShipment()">Add Shipment</button>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
  getFirestore, doc, getDoc, setDoc, getDocs, collection, query, where 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "bluewave-logistics-c9a21.firebaseapp.com",
  projectId: "bluewave-logistics-c9a21"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 👤 SIGNUP
window.signup = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, pass);
  alert("Account created!");
};

// 🔐 LOGIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, pass);
  alert("Logged in!");
};

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};

// 👀 AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userInfo").innerText =
      "Logged in: " + user.email;
  } else {
    document.getElementById("userInfo").innerText =
      "Not logged in";
  }
});

// 🚀 TRACK
window.track = async function () {
  const code = document.getElementById("code").value.trim();

  const ref = doc(db, "shipments", code);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Tracking not found</p>";
    return;
  }

  const data = snap.data();

  document.getElementById("result").innerHTML = `
    <b>📦 ${code}</b><br><br>
    📍 ${data.location}<br>
    👤 ${data.receiver}<br>
    📦 ${data.status}
  `;
};

// ➕ ADD SHIPMENT
window.addShipment = async function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Login first");
    return;
  }

  const code = "BW" + Math.floor(Math.random() * 10000);

  await setDoc(doc(db, "shipments", code), {
    location: document.getElementById("newLocation").value,
    receiver: document.getElementById("newReceiver").value,
    status: document.getElementById("newStatus").value,
    user: user.email
  });

  alert("Shipment created: " + code);
};

// 📦 USER SHIPMENTS
window.myShipments = async function () {
  const user = auth.currentUser;

  if (!user) {
    alert("Login first");
    return;
  }

  const q = query(
    collection(db, "shipments"),
    where("user", "==", user.email)
  );

  const snapshot = await getDocs(q);

  let output = "<h3>My Shipments</h3>";

  snapshot.forEach(docSnap => {
    const s = docSnap.data();

    output += `
      <div class="card">
        <b>${docSnap.id}</b><br>
        ${s.location}<br>
        ${s.status}
      </div>
    `;
  });

  document.getElementById("result").innerHTML = output;
};

</script>

</body>
</html>

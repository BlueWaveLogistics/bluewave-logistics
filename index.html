<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: #111;
      min-height: 100vh;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    input { background: #222; color: white; }
    button { background: #ffcc00; font-weight: bold; }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h3>Account</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>

    <p id="userInfo">Not logged in</p>
  </div>

  <!-- TRACK -->
  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <button onclick="myShipments()">📦 My Shipments</button>

  <div id="result" class="card"></div>

  <!-- ADMIN -->
  <div class="card">
    <h3>Add Shipment</h3>
    <input id="newLocation" placeholder="Location">
    <input id="newReceiver" placeholder="Receiver Email">
    <input id="newStatus" placeholder="Status">
    <button onclick="addShipment()">Add Shipment</button>
  </div>

  <!-- PAYMENT -->
  <button onclick="pay()">💳 Pay for Delivery</button>

</div>

</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");
})();
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getFirestore, doc, getDoc, setDoc, getDocs, collection, query, where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "bluewave-logistics-c9a21.firebaseapp.com",
  projectId: "bluewave-logistics-c9a21"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// AUTH
window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
  alert("Account created");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
  alert("Logged in");
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  userInfo.innerText = user ? user.email : "Not logged in";
});

// TRACK
window.track = async () => {
  const snap = await getDoc(doc(db, "shipments", code.value));
  if (!snap.exists()) return result.innerHTML = "Not found";

  const d = snap.data();

  result.innerHTML = `
    📦 ${code.value}<br>
    📍 ${d.location}<br>
    👤 ${d.receiver}<br>
    📦 ${d.status}
  `;
};

// ADD SHIPMENT
window.addShipment = async () => {
  const c = "BW" + Math.floor(Math.random()*10000);

  await setDoc(doc(db, "shipments", c), {
    location: newLocation.value,
    receiver: newReceiver.value,
    status: newStatus.value,
    user: auth.currentUser.email
  });

  // 📧 EMAIL
  emailjs.send("SERVICE_ID","TEMPLATE_ID",{
    to_email: newReceiver.value,
    message: "Your shipment is created"
  });

  alert("Created: " + c);
};

// USER SHIPMENTS
window.myShipments = async () => {
  const q = query(collection(db,"shipments"),
    where("user","==",auth.currentUser.email));

  const snap = await getDocs(q);

  let out = "";
  snap.forEach(d => {
    out += `<div>${d.id} - ${d.data().status}</div>`;
  });

  result.innerHTML = out;
};

</script>

<!-- PAYMENT -->
<script>
function pay() {
  window.location.href = "https://buy.stripe.com/test_xxxx";
}
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>

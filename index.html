<script>
const shipments = {
  "BW1234": {
    status: "In Transit",
    location: "New York, USA",
    sender: "BlueWave Warehouse",
    receiver: "John Smith",
    weight: "5kg",
    deliveryDate: "25 March 2026",
    history: [
      "Shipment created - Lagos",
      "Picked up by BlueWave Logistics",
      "Arrived at sorting facility"
    ]
  },

  "BW5678": {
    status: "Delivered",
    location: "London, UK",
    sender: "BlueWave Warehouse",
    receiver: "Jane Doe",
    weight: "2kg",
    deliveryDate: "20 March 2026",
    history: [
      "Shipment created",
      "In transit",
      "Out for delivery",
      "Delivered"
    ]
  }
};

function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (data) {

    // TIMELINE
    let historyHTML = "";
    data.history.forEach(item => {
      historyHTML += `<div class="timeline-item">${item}</div>`;
    });

    historyHTML = `<div class="timeline">${historyHTML}</div>`;

    // PROGRESS
    let progress = 0;
    if (data.status === "Pending") progress = 25;
    else if (data.status === "In Transit") progress = 50;
    else if (data.status === "Out for Delivery") progress = 75;
    else if (data.status === "Delivered") progress = 100;

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").innerText =
      "Progress: " + progress + "%";

    // RESULT
    document.getElementById("result").innerHTML =
      `<b>Status:</b> ${data.status}<br>
       <b>Location:</b> ${data.location}<br>
       <b>Sender:</b> ${data.sender}<br>
       <b>Receiver:</b> ${data.receiver}<br>
       <b>Weight:</b> ${data.weight}<br>
       <b>Delivery Date:</b> ${data.deliveryDate}<br><br>` +
      historyHTML;

  } else {
    document.getElementById("result").innerText = "Tracking code not found";
  }
}
</script>

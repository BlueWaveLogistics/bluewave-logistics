<!DOCTYPE html>
<html>
<head>
<title>BlueWave Logistics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#0a0a0a; color:white; }
header { background:#ffcc00; color:black; padding:15px; display:flex; justify-content:space-between; }
.page { display:none; padding:20px; }
.active { display:block; }

.hero {
  background:url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d");
  padding:100px 20px;
  text-align:center;
  background-size:cover;
}

.track {
  display:flex;
  max-width:400px;
  margin:auto;
}

.track input {
  flex:1;
  padding:15px;
  border-radius:10px 0 0 10px;
  border:none;
}

.track button {
  background:#ffcc00;
  border:none;
  padding:15px;
  border-radius:0 10px 10px 0;
}

.card {
  background:#111;
  padding:20px;
  border-radius:10px;
  margin-top:10px;
}

input {
  padding:12px;
  width:90%;
  margin:5px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
BlueWave Logistics 🚚
<button onclick="show('login')">Login</button>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="hero">
<h1>Live Shipment Tracking</h1>

<div class="track">
<input id="code" placeholder="Tracking code">
<button onclick="track()">Track</button>
</div>
</div>

<div id="result"></div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>Dashboard</h2>

<button onclick="show('admin')">Admin Panel</button>
<button onclick="logout()">Logout</button>

<div id="shipments"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>Add Shipment</h2>

<input id="location" placeholder="Location">
<input id="receiver" placeholder="Receiver">
<input id="weight" placeholder="Weight">
<input id="date" placeholder="Delivery Date">
<input id="status" placeholder="Status">

<button onclick="addShipment()">Add Shipment</button>
<button onclick="show('dashboard')">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqCDIlhWHEWsOkti8yEgN1BVKA5f1XNSE",
  authDomain: "bluewave-website.firebaseapp.com",
  projectId: "bluewave-website",
  storageBucket: "bluewave-website.appspot.com",
  messagingSenderId: "116060669757",
  appId: "1:116060669757:web:26d6ef7746c7feceeaa754"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// NAVIGATION
window.show = (id) => {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

// LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth,email.value,password.value);
    show("dashboard");
    loadShipments();
  } catch(e){
    alert(e.message);
  }
};

// SIGNUP
window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Account created");
  } catch(e){
    alert(e.message);
  }
};

// LOGOUT
window.logout = () => {
  signOut(auth);
  show("home");
};

// ADD SHIPMENT
window.addShipment = async () => {
  const code = "BW" + Math.floor(Math.random()*10000);

  await setDoc(doc(db,"shipments",code), {
    location: location.value,
    receiver: receiver.value,
    weight: weight.value,
    deliveryDate: date.value,
    status: status.value
  });

  alert("✅ Shipment Created: " + code);
};

// TRACK
window.track = async () => {
  const snap = await getDoc(doc(db,"shipments",code.value));

  if(snap.exists()){
    const d = snap.data();

    result.innerHTML = `
      <div class="card">
        <b>${code.value}</b><br><br>
        📍 ${d.location}<br>
        👤 ${d.receiver}<br>
        📦 ${d.weight}<br>
        📅 ${d.deliveryDate}<br>
        🚚 ${d.status}
      </div>
    `;
  } else {
    result.innerHTML = "<p style='color:red'>Tracking not found</p>";
  }
};

// LOAD DASHBOARD
async function loadShipments(){
  shipments.innerHTML = "";

  const snap = await getDocs(collection(db,"shipments"));

  snap.forEach(doc => {
    const d = doc.data();

    shipments.innerHTML += `
      <div class="card">
        ${doc.id}<br>
        ${d.location}<br>
        ${d.status}
      </div>
    `;
  });
}

</script>

</body>
</html>

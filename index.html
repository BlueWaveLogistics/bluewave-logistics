<!DOCTYPE html>
<html>
<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1f3a;
      color: white;
      text-align: center;
    }

    header {
      background: #08172b;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #ccc;
    }

    .tracking-box {
      margin-top: 30px;
    }

    input {
      padding: 12px;
      width: 70%;
      max-width: 250px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 12px 20px;
      background: orange;
      border: none;
      color: white;
      border-radius: 5px;
      margin-left: 5px;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }

    .services {
      margin-top: 40px;
      padding: 20px;
    }

    .card {
      background: #122b4a;
      margin: 10px auto;
      padding: 15px;
      border-radius: 8px;
      max-width: 300px;
    }
  </style>
</head>

<body>

<header>
  BlueWave Logistics 🚚
</header>

<div class="hero">
  <h1>Fast & Reliable Shipping</h1>
  <p>Delivering packages across Nigeria and beyond</p>

  <div class="tracking-box">
    <input type="text" id="code" placeholder="Enter tracking code">
    <button onclick="track()">Track</button>
  </div>

  <p id="result"></p>
</div>

<div class="services">
  <h2>Our Services</h2>

  <div class="card">🚚 Local Delivery</div>
  <div class="card">✈️ International Shipping</div>
  <div class="card">📦 Cargo Handling</div>
</div>

<script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANv_xiv_AgddM9hACDSEH8PEb8Z2JFIvU",
    authDomain: "bluewave-logistics-c9a21.firebaseapp.com",
    projectId: "bluewave-logistics-c9a21",
    storageBucket: "bluewave-logistics-c9a21.firebasestorage.app",
    messagingSenderId: "388186247669",
    appId: "1:388186247669:web:a28394e0e82bd499e410bc",
    measurementId: "G-KY76SYQQV0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.track = async function () {
    const input = document.getElementById("code").value;

    const docRef = doc(db, "shipments", input);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();
      document.getElementById("result").innerText =
        "Status: " + data.status + " | Location: " + data.location;
    } else {
      document.getElementById("result").innerText =
        "Tracking code not found";
    }
  };
</script>

</body>
</html>

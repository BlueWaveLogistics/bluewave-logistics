<!DOCTYPE html>
<html>

<head>
  <title>BlueWave Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #111;
      color: white;
    }

    header {
      background: #ffcc00;
      color: black;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 10px;
    }

    .pending { background: gray; }
    .transit { background: orange; }
    .delivered { background: green; }

    #progressBar {
      height: 8px;
      width: 0%;
      background: #ffcc00;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="app">

<header>BlueWave Logistics 🚚</header>

<div class="container">

  <h3>Track Shipment</h3>

  <input id="code" placeholder="Enter tracking code">
  <button onclick="track()">Track</button>

  <div id="result" class="card"></div>

  <div id="progressBar"></div>

</div>

</div>

<script>

// 💾 DATABASE (SAVED)
let shipments = JSON.parse(localStorage.getItem("shipments")) || {
  "BW1001": {
    status: "In Transit",
    location: "New York",
    history: ["Shipment created - Italy", "In transit"]
  },
  "BW1002": {
    status: "Delivered",
    location: "London",
    history: ["Shipment created - Italy", "Delivered"]
  }
};

function saveData() {
  localStorage.setItem("shipments", JSON.stringify(shipments));
}

// TRACK
function track() {
  const code = document.getElementById("code").value.trim();
  const data = shipments[code];

  if (!data) {
    result.innerHTML = "❌ Not found";
    return;
  }

  let cls =
    data.status === "Delivered" ? "delivered" :
    data.status === "In Transit" ? "transit" : "pending";

  let historyHTML = "";
  data.history.forEach(h => {
    historyHTML += `<div>• ${h}</div>`;
  });

  result.innerHTML =
    `<div class="status ${cls}">${data.status}</div>
     <br>📍 ${data.location}
     <br><br>${historyHTML}`;

  let progress =
    data.status === "Delivered" ? 100 :
    data.status === "In Transit" ? 50 : 25;

  document.getElementById("progressBar").style.width = progress + "%";
}

</script>

<!-- ✅ SERVICE WORKER CONNECT -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("PWA Ready"))
    .catch(err => console.log(err));
}
</script>

</body>
</html>
